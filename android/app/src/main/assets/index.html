<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<title>Iron Squad: Tactical Ops</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Segoe UI',system-ui,sans-serif;position:fixed}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
#ui>*{pointer-events:auto}

/* ===== LOADING ===== */
#loading{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#e6edf3}
#loading h1{font-size:clamp(20px,5vw,36px);letter-spacing:6px;text-transform:uppercase;margin-bottom:6px}
#loading .sub{color:#8b949e;font-size:clamp(10px,2.5vw,14px);margin-bottom:24px}
.ld-bar{width:clamp(180px,50vw,320px);height:3px;background:#21262d;border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,#238636,#58a6ff);width:0%;transition:width .4s}
.ld-status{color:#8b949e;font-size:12px;margin-top:10px}

/* ===== MAIN MENU ===== */
#main-menu{position:fixed;inset:0;background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9000}
#main-menu h1{font-size:clamp(22px,6vw,42px);color:#e6edf3;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
#main-menu .ver{color:#484f58;font-size:11px;margin-bottom:28px}
.menu-btn{padding:14px 36px;font-size:clamp(12px,3vw,16px);font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:5px;min-width:220px;text-transform:uppercase;letter-spacing:2px;transition:all .15s}
.menu-btn:active{transform:scale(.96)}
.btn-play{background:linear-gradient(135deg,#238636,#2ea043);color:#fff}
.btn-dm{background:#30363d;color:#e6edf3;border:1px solid #484f58}
.btn-settings{background:transparent;color:#8b949e;border:1px solid #30363d;font-size:12px;padding:10px 24px}
.menu-weapons{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap;justify-content:center}
.menu-weapons span{font-size:clamp(10px,2vw,14px);color:#8b949e;background:#161b22;padding:4px 10px;border-radius:4px;border:1px solid #30363d}

/* ===== BUY MENU ===== */
#buy-menu{position:fixed;inset:0;background:#0d1117f0;display:none;flex-direction:column;z-index:5000;overflow-y:auto;padding:20px}
#buy-menu h2{color:#e6edf3;font-size:clamp(16px,4vw,24px);text-align:center;margin-bottom:16px;letter-spacing:2px}
.buy-cat{margin-bottom:16px}
.buy-cat h3{color:#58a6ff;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #21262d}
.buy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.buy-item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px;cursor:pointer;transition:all .15s}
.buy-item:active{border-color:#58a6ff;background:#1c2333}
.buy-item.owned{border-color:#238636}
.buy-item .wname{color:#e6edf3;font-size:12px;font-weight:600}
.buy-item .wstat{color:#8b949e;font-size:10px;margin-top:2px}
.buy-item .wprice{color:#e3b341;font-size:11px;margin-top:4px;font-weight:600}
.buy-close{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 40px;background:#da3633;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;z-index:5001}

/* ===== HUD ===== */
#hud{position:fixed;inset:0;pointer-events:none;display:none;z-index:200}
.hud-bottom{position:absolute;bottom:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:12px 16px}
.hud-health{display:flex;flex-direction:column;gap:2px}
.hp-row{display:flex;align-items:center;gap:6px}
.hp-icon{font-size:18px}
.hp-val{color:#f85149;font-size:clamp(16px,4vw,22px);font-weight:700;font-variant-numeric:tabular-nums}
.armor-val{color:#e3b341;font-size:clamp(12px,3vw,16px);font-weight:600}
.hud-ammo{text-align:right}
.ammo-cur{color:#e6edf3;font-size:clamp(22px,6vw,32px);font-weight:700;font-variant-numeric:tabular-nums}
.ammo-res{color:#8b949e;font-size:clamp(11px,2.5vw,14px)}
.hud-top{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:8px 16px}
.score-ct{color:#58a6ff;font-size:clamp(14px,3.5vw,20px);font-weight:700}
.score-t{color:#e3b341;font-size:clamp(14px,3.5vw,20px);font-weight:700}
.round-info{color:#8b949e;font-size:clamp(10px,2.5vw,13px);text-align:center}
.hud-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.hitmarker{position:absolute;width:24px;height:24px;opacity:0;transition:opacity .1s}
.hitmarker::before,.hitmarker::after{content:'';position:absolute;background:#fff}
.hitmarker::before{width:2px;height:12px;left:11px;top:6px}
.hitmarker::after{width:12px;height:2px;top:11px;left:6px}
.hitmarker.show{opacity:1}

/* Kill feed */
#killfeed{position:fixed;top:40px;right:12px;display:flex;flex-direction:column;gap:3px;z-index:210;pointer-events:none}
.kf-msg{font-size:clamp(9px,2vw,11px);color:#8b949e;background:#161b22aa;padding:3px 8px;border-radius:4px;backdrop-filter:blur(4px);animation:kffade 4s forwards;white-space:nowrap}
@keyframes kffade{0%,75%{opacity:1}100%{opacity:0}}

/* Crosshair */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:300;display:none}
.ch-line{position:absolute;background:#00ff00cc}
.ch-top{width:2px;height:8px;left:calc(50% - 1px);top:-14px}
.ch-bot{width:2px;height:8px;left:calc(50% - 1px);bottom:-14px}
.ch-left{width:8px;height:2px;top:calc(50% - 1px);left:-14px}
.ch-right{width:8px;height:2px;top:calc(50% - 1px);right:-14px}
.ch-dot{position:absolute;width:2px;height:2px;background:#00ff00cc;top:calc(50% - 1px);left:calc(50% - 1px);border-radius:50%}

/* Damage vignette */
#dmg-vignette{position:fixed;inset:0;pointer-events:none;z-index:150;opacity:0;transition:opacity .2s;background:radial-gradient(ellipse at center,transparent 40%,#f8514966 100%)}

/* Round start */
#round-banner{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);color:#e6edf3;font-size:clamp(16px,4vw,28px);font-weight:700;text-transform:uppercase;letter-spacing:3px;opacity:0;transition:opacity .5s;z-index:400;pointer-events:none;text-shadow:0 0 20px #000}
#round-sub{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);color:#8b949e;font-size:clamp(11px,2.5vw,15px);opacity:0;transition:opacity .5s;z-index:400;pointer-events:none}

/* Game over */
#gameover{position:fixed;inset:0;background:#0d1117ee;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:8000}
#gameover h2{font-size:clamp(22px,6vw,38px);text-transform:uppercase;margin-bottom:8px;letter-spacing:3px}
.go-ct{color:#58a6ff}
.go-t{color:#e3b341}
#gameover .stats{color:#8b949e;font-size:clamp(12px,3vw,16px);margin-bottom:24px;text-align:center;line-height:1.8}

/* Controls hint */
#controls-hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:#484f58;font-size:10px;text-align:center;z-index:210;pointer-events:none}

/* Pause */
#pause{position:fixed;inset:0;background:#0d1117dd;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:7000}
#pause h2{color:#e6edf3;font-size:clamp(18px,5vw,28px);margin-bottom:20px}
</style>

  <button class="menu-btn btn-dm" onclick="G.start('dm')">💀 ДЕСТМАТЧ</button>
  <button class="menu-btn btn-settings" onclick="G.start('wingman')">2v2 ВИНГМАН</button>
</div>

<!-- BUY MENU -->
<div id="buy-menu">
  <h2>Магазин оружия</h2>

</div>
<button class="buy-close" id="buy-close" onclick="G.closeBuy()">ЗАКРЫТЬ [B]</button>

<!-- HUD -->
<div id="hud">

    <div class="score-ct" id="hud-ct">CT: 0</div>

    <div class="hud-health">

      <div class="ammo-res" id="hud-reserve">90</div>
    </div>
  </div>
  <div class="hud-center"><div class="hitmarker" id="hitmarker"></div></div>
  <div id="killfeed"></div>
</div>

<!-- Crosshair -->
<div id="crosshair">
  <div class="ch-line ch-top"></div>
  <div class="ch-line ch-bot"></div>
  <div class="ch-line ch-left"></div>
  <div class="ch-line ch-right"></div>
  <div class="ch-dot"></div>
</div>

<!-- Damage vignette -->
<div id="dmg-vignette"></div>

<!-- Round banner -->
<div id="round-banner"></div>
<div id="round-sub"></div>

<!-- Game Over -->
<div id="gameover">
  <h2 id="go-title">ПОБЕДА CT</h2>
  <div class="stats" id="go-stats"></div>
  <button class="menu-btn btn-play" onclick="G.backToMenu()">МЕНЮ</button>
  <button class="menu-btn btn-dm" onclick="G.restart()">ЗАНОВО</button>
</div>

<!-- Pause -->
<div id="pause">
  <h2>ПАУЗА</h2>
  <button class="menu-btn btn-play" onclick="G.resume()">ПРОДОЛЖИТЬ</button>
  <button class="menu-btn btn-dm" onclick="G.backToMenu()">МЕНЮ</button>
</div>

<!-- Controls hint -->
<div id="controls-hint">Левый стик — движение | Правая часть — обзор + стрельба | B — магазин | R — перезарядка</div>

// ================================================================
//  SOUND ENGINE (procedural)
// ================================================================
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }
  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  ensureCtx() {
    if (!this.ctx) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }
  play(type) {
    if (!this.enabled) return;
    this.ensureCtx();
    const c = this.ctx, now = c.currentTime;
    const o = c.createOscillator();
    const g = c.createGain();
    const d = c.createBiquadFilter();
    o.connect(d); d.connect(g); g.connect(c.destination);
    d.type = 'lowpass';

    switch(type) {
      case 'rifle':
        o.type='sawtooth'; o.frequency.setValueAtTime(200,now);
        o.frequency.exponentialRampToValueAtTime(80,now+0.1);
        d.frequency.value=2000; g.gain.setValueAtTime(0.3,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
        o.start(now); o.stop(now+0.12); break;
      case 'smg':
        o.type='square'; o.frequency.setValueAtTime(300,now);
        o.frequency.exponentialRampToValueAtTime(100,now+0.06);
        d.frequency.value=3000; g.gain.setValueAtTime(0.2,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.07);
        o.start(now); o.stop(now+0.07); break;
      case 'pistol':
        o.type='triangle'; o.frequency.setValueAtTime(400,now);
        o.frequency.exponentialRampToValueAtTime(150,now+0.08);
        d.frequency.value=2500; g.gain.setValueAtTime(0.25,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.1);
        o.start(now); o.stop(now+0.1); break;
      case 'deagle':
        o.type='sawtooth'; o.frequency.setValueAtTime(150,now);
        o.frequency.exponentialRampToValueAtTime(40,now+0.15);
        d.frequency.value=1500; g.gain.setValueAtTime(0.4,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
        o.start(now); o.stop(now+0.18); break;
      case 'awp':
        o.type='sawtooth'; o.frequency.setValueAtTime(100,now);
        o.frequency.exponentialRampToValueAtTime(20,now+0.3);
        d.frequency.value=800; g.gain.setValueAtTime(0.5,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        o.start(now); o.stop(now+0.35); break;
      case 'scout':
        o.type='triangle'; o.frequency.setValueAtTime(180,now);
        o.frequency.exponentialRampToValueAtTime(50,now+0.2);
        d.frequency.value=1200; g.gain.setValueAtTime(0.35,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
        o.start(now); o.stop(now+0.25); break;
      case 'shotgun':
        o.type='sawtooth'; o.frequency.setValueAtTime(120,now);
        o.frequency.exponentialRampToValueAtTime(30,now+0.2);
        d.frequency.value=1000; g.gain.setValueAtTime(0.5,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
        o.start(now); o.stop(now+0.25); break;
      case 'mg':
        o.type='sawtooth'; o.frequency.setValueAtTime(160,now);
        o.frequency.exponentialRampToValueAtTime(60,now+0.1);
        d.frequency.value=1800; g.gain.setValueAtTime(0.3,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
        o.start(now); o.stop(now+0.12); break;
      case 'hit':
        o.type='sine'; o.frequency.setValueAtTime(800,now);
        o.frequency.exponentialRampToValueAtTime(400,now+0.05);
        g.gain.setValueAtTime(0.15,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
        o.start(now); o.stop(now+0.06); break;
      case 'kill':
        o.type='sine'; o.frequency.setValueAtTime(600,now);
        o.frequency.setValueAtTime(900,now+0.05);
        g.gain.setValueAtTime(0.2,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
        o.start(now); o.stop(now+0.12); break;
      case 'reload':
        o.type='triangle'; o.frequency.setValueAtTime(500,now);
        o.frequency.setValueAtTime(300,now+0.1);
        g.gain.setValueAtTime(0.1,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        o.start(now); o.stop(now+0.15); break;
      case 'buy':
        o.type='sine'; o.frequency.setValueAtTime(500,now);
        o.frequency.setValueAtTime(700,now+0.08);
        g.gain.setValueAtTime(0.12,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        o.start(now); o.stop(now+0.15); break;
      case 'round':
        o.type='sine'; o.frequency.setValueAtTime(400,now);
        o.frequency.setValueAtTime(600,now+0.15);
        o.frequency.setValueAtTime(800,now+0.3);
        g.gain.setValueAtTime(0.15,now);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
        o.start(now); o.stop(now+0.4); break;
    }
  }
}

// ================================================================
//  GAME ENGINE
// ================================================================
class Game {
  constructor() {
    this.scene = null;
    this.camera = null;
    this.renderer = null;
    this.clock = new THREE.Clock();
    this.sound = new SoundEngine();

    // Player state
    this.hp = 100;
    this.armor = 0;
    this.money = 800;
    this.team = 'ct';
    this.weapon = 'usp';
    this.ammo = 12;
    this.reserve = 24;
    this.reloading = false;
    this.reloadStart = 0;
    this.lastShot = 0;
    this.recoilX = 0;
    this.recoilY = 0;
    this.kills = 0;
    this.deaths = 0;
    this.assists = 0;

    // Round state
    this.mode = 'defusal';
    this.round = 0;
    this.ctScore = 0;
    this.tScore = 0;
    this.roundActive = false;
    this.roundTimer = 0;
    this.buyTime = false;
    this.mapName = 'dust2';

    // Game objects
    this.playerPos = new THREE.Vector3();
    this.playerYaw = 0;
    this.playerPitch = 0;
    this.bots = [];
    this.bullets = [];
    this.particles = [];
    this.obstacles = [];
    this.mapGroup = null;

    // Input
    this.moveX = 0;
    this.moveZ = 0;
    this.lookX = 0;
    this.lookY = 0;
    this.joyActive = false;
    this.joyTouchId = null;
    this.joyBaseX = 0;
    this.joyBaseY = 0;
    this.aimActive = false;
    this.aimTouchId = null;
    this.shooting = false;
    this.keys = {};

    // Camera
    this.camPitch = 0;
    this.camYaw = 0;
    this.sensitivity = 0.003;

    // Recoil pattern
    this.recoilPattern = [];
    this.recoilIndex = 0;
  }

  // --------------------------------------------------------
  //  INIT
  // --------------------------------------------------------
  async init() {
    this.setLoad(5, 'Рендеринг...');
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x87CEEB);
    this.scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 300);
    this.renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.0;
    document.body.insertBefore(this.renderer.domElement, document.body.firstChild);

    this.setLoad(15, 'Освещение...');
    this.setupLighting();

    this.setLoad(25, 'Звуки...');
    this.sound.init();

    this.setLoad(30, 'Карты...');
    this.loadMap('dust2');

    this.setLoad(70, 'Управление...');
    this.setupInput();

    this.setLoad(90, 'Проверка...');
    await new Promise(r => setTimeout(r, 300));

    this.setLoad(100, 'Готово!');
    await new Promise(r => setTimeout(r, 400));

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-menu').style.display = 'flex';

    this.animate();
  }

  setLoad(pct, msg) {
    document.getElementById('ld-bar').style.width = pct + '%';
    document.getElementById('ld-status').textContent = msg;
  }

  // --------------------------------------------------------
  //  LIGHTING
  // --------------------------------------------------------
  setupLighting() {
    this.scene.add(new THREE.AmbientLight(0x6688aa, 0.5));
    this.scene.add(new THREE.HemisphereLight(0x87ceeb, 0x362a28, 0.6));

    const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
    sun.position.set(40, 60, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    const s = 50;
    sun.shadow.camera.left = -s;
    sun.shadow.camera.right = s;
    sun.shadow.camera.top = s;
    sun.shadow.camera.bottom = -s;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 200;
    this.scene.add(sun);

    const fill = new THREE.DirectionalLight(0x4466aa, 0.3);
    fill.position.set(-20, 15, -10);
    this.scene.add(fill);
  }

  // --------------------------------------------------------
  //  MAP LOADING
  // --------------------------------------------------------
  loadMap(name) {
    if (this.mapGroup) this.scene.remove(this.mapGroup);
    this.mapGroup = new THREE.Group();
    this.obstacles = [];

    const map = MAPS[name];
    this.mapName = name;

    // Ground
    const groundMat = new THREE.MeshStandardMaterial({color:0xc2b280, roughness:0.9});
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(map.size, map.size), groundMat);
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    this.mapGroup.add(ground);

    // Sand patches
    for (let i = 0; i < 40; i++) {
      const s = 2 + Math.random()*5;
      const patch = new THREE.Mesh(new THREE.PlaneGeometry(s,s), new THREE.MeshStandardMaterial({color:0xd4c494, roughness:1}));
      patch.rotation.x = -Math.PI/2;
      patch.position.set((Math.random()-0.5)*map.size*0.8, 0.01, (Math.random()-0.5)*map.size*0.8);
      this.mapGroup.add(patch);
    }

    // Buildings
    map.buildings.forEach(b => {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(b.w, b.h, b.d), new THREE.MeshStandardMaterial({color:b.c, roughness:0.8}));
      body.position.y = b.h/2;
      body.castShadow = true;
      body.receiveShadow = true;
      g.add(body);

      // Roof
      const roof = new THREE.Mesh(new THREE.BoxGeometry(b.w+0.4,0.3,b.d+0.4), new THREE.MeshStandardMaterial({color:0x665544, roughness:0.7}));
      roof.position.y = b.h;
      g.add(roof);

      // Windows
      const winMat = new THREE.MeshStandardMaterial({color:0x88aacc, emissive:0x223344, emissiveIntensity:0.2, roughness:0.2});
      for (let wy = 1.5; wy < b.h-0.5; wy += 2.5) {
        for (let wx = -b.w/2+1.2; wx < b.w/2-0.5; wx += 2) {
          if (Math.random() > 0.6) continue;
          const win = new THREE.Mesh(new THREE.PlaneGeometry(0.9,1.2), winMat);
          win.position.set(wx, wy, b.d/2+0.01);
          g.add(win);
          const win2 = win.clone();
          win2.position.z = -b.d/2-0.01;
          win2.rotation.y = Math.PI;
          g.add(win2);
        }
      }

      g.position.set(b.x, 0, b.z);
      this.mapGroup.add(g);
      this.obstacles.push({x:b.x-b.w/2, z:b.z-b.d/2, w:b.w, d:b.d, h:b.h});
    });

    // Crates
    const crateMat = new THREE.MeshStandardMaterial({color:0x8B7355, roughness:0.9});
    map.crates.forEach(c => {
      const crate = new THREE.Mesh(new THREE.BoxGeometry(c.s,c.s,c.s), crateMat);
      crate.position.set(c.x, c.s/2, c.z);
      crate.castShadow = true;
      crate.receiveShadow = true;
      crate.rotation.y = Math.random()*Math.PI;
      this.mapGroup.add(crate);
      this.obstacles.push({x:c.x-c.s/2, z:c.z-c.s/2, w:c.s, d:c.s, h:c.s});
    });

    // Barrels
    const barrelMat = new THREE.MeshStandardMaterial({color:0x556644, roughness:0.6, metalness:0.3});
    for (let i = 0; i < 8; i++) {
      const bx = (Math.random()-0.5)*map.size*0.6;
      const bz = (Math.random()-0.5)*map.size*0.6;
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1.4,10), barrelMat);
      barrel.position.set(bx, 0.7, bz);
      barrel.castShadow = true;
      this.mapGroup.add(barrel);
      this.obstacles.push({x:bx-0.5, z:bz-0.5, w:1, d:1, h:1.4});
    }

    // Boundary walls
    const wallMat = new THREE.MeshStandardMaterial({color:0x998877, roughness:0.8});
    const hs = map.size/2;
    const wh = 5;
    [{p:[0,wh/2,-hs],s:[map.size,wh,1]},{p:[0,wh/2,hs],s:[map.size,wh,1]},
     {p:[-hs,wh/2,0],s:[1,wh,map.size]},{p:[hs,wh/2,0],s:[1,wh,map.size]}
    ].forEach(w => {
      const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), wallMat);
      m.position.set(...w.p);
      m.castShadow = true;
      m.receiveShadow = true;
      this.mapGroup.add(m);
    });

    // Decorative elements
    // Street lights
    const poleMat = new THREE.MeshStandardMaterial({color:0x333333, metalness:0.5});
    const lampMat = new THREE.MeshStandardMaterial({color:0xffdd88, emissive:0xffaa44, emissiveIntensity:0.6});
    for (let i = 0; i < 6; i++) {
      const lx = (Math.random()-0.5)*map.size*0.5;
      const lz = (Math.random()-0.5)*map.size*0.5;
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,4,6), poleMat);
      pole.position.set(lx, 2, lz);
      this.mapGroup.add(pole);
      const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8), lampMat);
      lamp.position.set(lx, 4.2, lz);
      this.mapGroup.add(lamp);
      const pl = new THREE.PointLight(0xffaa44, 0.4, 12);
      pl.position.set(lx, 4, lz);
      this.mapGroup.add(pl);
    }

    // Bomb site marker
    if (this.mode === 'defusal') {
      const marker = new THREE.Mesh(
        new THREE.RingGeometry(1.5, 2, 32),
        new THREE.MeshBasicMaterial({color:0xff4444, side:THREE.DoubleSide, transparent:true, opacity:0.5})
      );
      marker.rotation.x = -Math.PI/2;
      marker.position.set(map.bombSite.x, 0.02, map.bombSite.z);
      this.mapGroup.add(marker);
    }

    this.scene.add(this.mapGroup);
  }

  // --------------------------------------------------------
  //  BOT AI
  // --------------------------------------------------------
  spawnBot(team, weapon) {
    const map = MAPS[this.mapName];
    const spawn = team === 'ct' ? map.spawnCT : map.spawnT;
    const bx = spawn.x + (Math.random()-0.5)*6;
    const bz = spawn.z + (Math.random()-0.5)*6;

    const group = new THREE.Group();
    const bodyColor = team === 'ct' ? 0x2244aa : 0xaa8822;

    // Body
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,1.2,8), new THREE.MeshStandardMaterial({color:bodyColor, roughness:0.6}));
    body.position.y = 0.9;
    body.castShadow = true;
    group.add(body);

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8), new THREE.MeshStandardMaterial({color:0xddbb88, roughness:0.7}));
    head.position.y = 1.65;
    group.add(head);

    // Helmet
    const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.28,8,8), new THREE.MeshStandardMaterial({color:team==='ct'?0x334455:0x556633, roughness:0.4, metalness:0.4}));
    helmet.position.y = 1.7;
    helmet.scale.y = 0.7;
    group.add(helmet);

    // Gun
    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.5), new THREE.MeshStandardMaterial({color:0x222222, metalness:0.8}));
    gun.position.set(0.3, 1.0, 0.3);
    group.add(gun);

    group.position.set(bx, 0, bz);
    this.scene.add(group);

    const w = WEAPONS[weapon] || WEAPONS.ak47;
    const diff = this.bots.length < 3 ? 0.3 : (this.bots.length < 6 ? 0.5 : 0.7);

    const bot = {
      mesh: group,
      team,
      weapon: weapon,
      hp: 100,
      maxHp: 100,
      speed: 3 + Math.random(),
      damage: w.dmg,
      fireRate: w.rate,
      lastShot: 0,
      ammo: w.mag,
      state: 'patrol',
      target: null,
      difficulty: diff,
      patrolTarget: new THREE.Vector3(
        (Math.random()-0.5)*MAPS[this.mapName].size*0.6,
        0,
        (Math.random()-0.5)*MAPS[this.mapName].size*0.6
      ),
      stateTimer: 0,
      alive: true
    };
    this.bots.push(bot);
    return bot;
  }

  updateBots(dt) {
    const playerPos = this.playerPos;
    const now = performance.now();

    for (const bot of this.bots) {
      if (!bot.alive) continue;

      const dx = playerPos.x - bot.mesh.position.x;
      const dz = playerPos.z - bot.mesh.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const angle = Math.atan2(dx, dz);

      // State machine
      if (dist < 25 && this.lineOfSight(bot.mesh.position, playerPos)) {
        bot.state = 'combat';
      } else if (dist < 40) {
        bot.state = 'chase';
      } else {
        bot.state = 'patrol';
      }

      bot.mesh.rotation.y = angle;

      let moveAngle = angle;
      let speed = bot.speed;

      switch(bot.state) {
        case 'patrol':
          const tx = bot.patrolTarget.x - bot.mesh.position.x;
          const tz = bot.patrolTarget.z - bot.mesh.position.z;
          const td = Math.sqrt(tx*tx+tz*tz);
          if (td < 3) {
            bot.patrolTarget.set(
              (Math.random()-0.5)*MAPS[this.mapName].size*0.6,
              0,
              (Math.random()-0.5)*MAPS[this.mapName].size*0.6
            );
          }
          moveAngle = Math.atan2(tx, tz);
          speed = bot.speed * 0.6;
          break;

        case 'chase':
          speed = bot.speed;
          break;

        case 'combat':
          // Strafe
          bot.stateTimer += dt;
          if (bot.stateTimer > 2) { bot.stateTimer = 0; }
          moveAngle = angle + Math.PI/2 * (bot.stateTimer < 1 ? 1 : -1);
          speed = bot.speed * 0.4;

          // Shoot at player
          if (now - bot.lastShot > bot.fireRate / bot.difficulty) {
            if (bot.ammo > 0) {
              const origin = bot.mesh.position.clone();
              origin.y += 1;
              const dir = new THREE.Vector3(dx, 0, dz).normalize();
              // Inaccuracy based on difficulty
              dir.x += (Math.random()-0.5)*(1-bot.difficulty)*0.2;
              dir.z += (Math.random()-0.5)*(1-bot.difficulty)*0.2;
              dir.normalize();

              this.fireBullet(origin, dir, 'enemy', bot.damage);
              bot.lastShot = now;
              bot.ammo--;
              this.sound.play(WEAPONS[bot.weapon]?.sound || 'rifle');
            } else {
              bot.ammo = WEAPONS[bot.weapon]?.mag || 30;
            }
          }
          break;
      }

      // Move
      const mx = Math.sin(moveAngle) * speed * dt;
      const mz = Math.cos(moveAngle) * speed * dt;
      const nx = bot.mesh.position.x + mx;
      const nz = bot.mesh.position.z + mz;

      let blocked = false;
      for (const o of this.obstacles) {
        if (nx+0.4>o.x && nx-0.4<o.x+o.w && nz+0.4>o.z && nz-0.4<o.z+o.d) {
          blocked = true; break;
        }
      }
      const hs = MAPS[this.mapName].size/2 - 2;
      if (!blocked && Math.abs(nx) < hs && Math.abs(nz) < hs) {
        bot.mesh.position.x = nx;
        bot.mesh.position.z = nz;
      } else {
        // Pick new patrol target
        bot.patrolTarget.set(
          (Math.random()-0.5)*MAPS[this.mapName].size*0.6,
          0,
          (Math.random()-0.5)*MAPS[this.mapName].size*0.6
        );
      }
    }
  }

  lineOfSight(from, to) {
    const dx = to.x - from.x;
    const dz = to.z - from.z;
    const dist = Math.sqrt(dx*dx+dz*dz);
    const steps = Math.ceil(dist / 2);
    for (let i = 1; i < steps; i++) {
      const t = i / steps;
      const px = from.x + dx*t;
      const pz = from.z + dz*t;
      for (const o of this.obstacles) {
        if (px > o.x && px < o.x+o.w && pz > o.z && pz < o.z+o.d) return false;
      }
    }
    return true;
  }

  damageBot(bot, dmg) {
    bot.hp -= dmg;
    // Flash
    bot.mesh.children[0].material.emissive = new THREE.Color(0xff0000);
    bot.mesh.children[0].material.emissiveIntensity = 0.5;
    setTimeout(() => { if(bot.mesh.children[0]) bot.mesh.children[0].material.emissiveIntensity = 0; }, 100);

    if (bot.hp <= 0) {
      this.killBot(bot);
    }
  }

  killBot(bot) {
    bot.alive = false;
    this.kills++;
    this.money += 300;
    this.sound.play('kill');

    // Death effect
    for (let i = 0; i < 10; i++) {
      const geo = new THREE.SphereGeometry(0.05, 4, 4);
      const mat = new THREE.MeshBasicMaterial({color: 0xff3333, transparent:true});
      const p = new THREE.Mesh(geo, mat);
      p.position.copy(bot.mesh.position);
      p.position.y += 1;
      this.scene.add(p);
      this.particles.push({
        mesh: p,
        velocity: new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3+1, (Math.random()-0.5)*4),
        life: 1
      });
    }

    this.scene.remove(bot.mesh);
    this.addKillFeed(`${bot.team==='ct'?'CT':'T'} eliminated`);

    // Check round end
    if (this.mode === 'defusal') {
      const aliveEnemies = this.bots.filter(b => b.alive && b.team !== this.team);
      if (aliveEnemies.length === 0) {
        setTimeout(() => this.endRound(this.team === 'ct' ? 'ct' : 't'), 1500);
      }
    }
  }

  // --------------------------------------------------------
  //  BULLETS
  // --------------------------------------------------------
  fireBullet(origin, dir, owner, damage) {
    const geo = new THREE.SphereGeometry(0.05, 4, 4);
    const mat = new THREE.MeshBasicMaterial({color: owner==='player' ? 0xffff00 : 0xff4444});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(origin);
    this.scene.add(mesh);

    // Tracer
    const tracerGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.3, 4);
    const tracerMat = new THREE.MeshBasicMaterial({color: owner==='player' ? 0xffff00 : 0xff4444, transparent:true, opacity:0.5});
    const tracer = new THREE.Mesh(tracerGeo, tracerMat);
    tracer.rotation.x = Math.PI/2;
    mesh.add(tracer);

    this.bullets.push({
      mesh,
      velocity: dir.multiplyScalar(60),
      damage,
      owner,
      life: 2
    });
  }

  // --------------------------------------------------------
  //  PLAYER SHOOTING
  // --------------------------------------------------------
  playerShoot() {
    if (this.reloading || this.hp <= 0) return;
    const w = WEAPONS[this.weapon];
    const now = performance.now();
    if (now - this.lastShot < w.rate) return;
    if (this.ammo <= 0) { this.startReload(); return; }

    const pellets = w.pellets || 1;
    for (let i = 0; i < pellets; i++) {
      const dir = new THREE.Vector3(0, 0, -1);
      dir.applyEuler(new THREE.Euler(this.camPitch, this.camYaw, 0, 'YXZ'));

      // Apply spread
      const spread = w.spread * (1 + this.recoilIndex * 0.05);
      dir.x += (Math.random()-0.5)*spread;
      dir.y += (Math.random()-0.5)*spread;
      dir.z += (Math.random()-0.5)*spread;
      dir.normalize();

      const origin = this.playerPos.clone();
      origin.y += 1.5;

      this.fireBullet(origin, dir, 'player', w.dmg);
    }

    // Recoil
    this.recoilY += w.recoilY;
    this.recoilX += (Math.random()-0.5)*w.recoilX;
    this.recoilIndex++;

    this.lastShot = now;
    this.ammo--;
    this.sound.play(w.sound);

    // Muzzle flash
    const mf = new THREE.PointLight(0xffaa00, 2, 5);
    mf.position.copy(this.playerPos);
    mf.position.y += 1.5;
    this.scene.add(mf);
    setTimeout(() => this.scene.remove(mf), 40);

    this.updateAmmoDisplay();
  }

  startReload() {
    if (this.reloading) return;
    const w = WEAPONS[this.weapon];
    if (this.reserve <= 0 || this.ammo >= w.mag) return;
    this.reloading = true;
    this.reloadStart = performance.now();
    this.sound.play('reload');
  }

  finishReload() {
    const w = WEAPONS[this.weapon];
    const needed = w.mag - this.ammo;
    const loaded = Math.min(needed, this.reserve);
    this.ammo += loaded;
    this.reserve -= loaded;
    this.reloading = false;
    this.updateAmmoDisplay();
  }

  // --------------------------------------------------------
  //  DAMAGE
  // --------------------------------------------------------
  dealDamage(dmg) {
    if (this.armor > 0) {
      const absorbed = Math.min(this.armor, dmg * 0.5);
      this.armor -= absorbed;
      dmg -= absorbed;
    }
    this.hp -= dmg;

    // Vignette
    const vig = document.getElementById('dmg-vignette');
    vig.style.opacity = '0.6';
    setTimeout(() => vig.style.opacity = '0', 200);

    this.updateHUD();
    if (this.hp <= 0) {
      this.hp = 0;
      this.deaths++;
      this.updateHUD();
      setTimeout(() => this.respawn(), 2000);
    }
  }

  respawn() {
    this.hp = 100;
    this.armor = 0;
    const map = MAPS[this.mapName];
    const spawn = this.team === 'ct' ? map.spawnCT : map.spawnT;
    this.playerPos.set(spawn.x + (Math.random()-0.5)*3, 0, spawn.z + (Math.random()-0.5)*3);
    this.camPitch = 0;
    this.camYaw = 0;
    this.recoilX = 0;
    this.recoilY = 0;
    this.recoilIndex = 0;
    this.updateHUD();
  }

  // --------------------------------------------------------
  //  ROUND MANAGEMENT
  // --------------------------------------------------------
  startRound() {
    this.round++;
    this.roundActive = true;
    this.roundTimer = 115; // 1:55

    // Clear old bots
    this.bots.forEach(b => { if(b.mesh.parent) this.scene.remove(b.mesh); });
    this.bots = [];
    this.bullets.forEach(b => { if(b.mesh.parent) this.scene.remove(b.mesh); });
    this.bullets = [];

    // Spawn bots
    const botCount = this.mode === 'wingman' ? 1 : 4;
    const tWeapons = ['ak47','ak47','galil','mac10','ak47'];
    const ctWeapons = ['m4a4','m4a4','famas','mp9','m4a4'];

    for (let i = 0; i < botCount; i++) {
      this.spawnBot('t', tWeapons[i % tWeapons.length]);
    }
    for (let i = 0; i < botCount; i++) {
      this.spawnBot('ct', ctWeapons[i % ctWeapons.length]);
    }

    // Respawn player
    this.respawn();

    this.showBanner(`РАУНД ${this.round}`, `${this.mode==='defusal'?'Дефуз бомбы':'Уничтожь противников'}`);
    this.sound.play('round');
    this.updateHUD();
  }

  endRound(winner) {
    if (!this.roundActive) return;
    this.roundActive = false;

    if (winner === 'ct') this.ctScore++;
    else this.tScore++;

    this.showBanner(`${winner.toUpperCase()} ПОБЕДИЛИ`, `Счёт: CT ${this.ctScore} — ${this.tScore} T`);

    // Bonus money
    this.money += winner === this.team ? 3250 : 1400;

    // Check match end
    if (this.ctScore >= 13 || this.tScore >= 13) {
      setTimeout(() => this.gameOver(), 3000);
      return;
    }

    // Next round after buy time
    setTimeout(() => {
      this.buyTime = true;
      this.showBanner('Магазин', 'Нажмите B для покупки');
      setTimeout(() => {
        this.buyTime = false;
        this.startRound();
      }, 15000);
    }, 3000);
  }

  gameOver() {
    const winner = this.ctScore > this.tScore ? 'CT' : 'T';
    const go = document.getElementById('gameover');
    const title = document.getElementById('go-title');
    title.textContent = `ПОБЕДА ${winner}`;
    title.className = winner === 'CT' ? 'go-ct' : 'go-t';
    document.getElementById('go-stats').innerHTML =
      `Счёт: CT ${this.ctScore} — ${this.tScore} T<br>` +
      `Убийств: ${this.kills} | Смертей: ${this.deaths}<br>` +
      `Деньги: $${this.money}`;
    go.style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('crosshair').style.display = 'none';
  }

  // --------------------------------------------------------
  //  BUY MENU
  // --------------------------------------------------------
  openBuy() {
    if (!this.buyTime && this.hp < 100) {
      // Allow buying if alive and have money, but only in buy time or with kit
    }
    const content = document.getElementById('buy-content');
    content.innerHTML = '';

    const cats = {pistol:'Пистолеты',smg:'Пистолет-пулемёты',rifle:'Автоматы',sniper:'Снайперки',shotgun:'Дробовики',mg:'Пулемёты'};

    for (const [cat, label] of Object.entries(cats)) {
      const div = document.createElement('div');
      div.className = 'buy-cat';
      div.innerHTML = `<h3>${label}</h3><div class="buy-grid" id="buy-${cat}"></div>`;
      content.appendChild(div);

      const grid = div.querySelector('.buy-grid');
      for (const [key, w] of Object.entries(WEAPONS)) {
        if (w.cat !== cat) continue;
        const item = document.createElement('div');
        item.className = 'buy-item' + (this.weapon === key ? ' owned' : '');
        item.innerHTML = `
          <div class="wname">${w.name}</div>
          <div class="wstat">Урон: ${w.dmg} | Маг: ${w.mag} | ${w.auto?'Авто':'Стреляй'}</div>
          <div class="wprice">$${w.price}</div>
        `;
        item.onclick = () => this.buyWeapon(key);
        grid.appendChild(item);
      }
    }

    document.getElementById('buy-menu').style.display = 'flex';
    document.getElementById('buy-close').style.display = 'block';
  }

  closeBuy() {
    document.getElementById('buy-menu').style.display = 'none';
    document.getElementById('buy-close').style.display = 'none';
  }

  buyWeapon(key) {
    const w = WEAPONS[key];
    if (this.money < w.price) return;
    this.money -= w.price;
    this.weapon = key;
    this.ammo = w.mag;
    this.reserve = w.reserve;
    this.reloading = false;
    this.recoilIndex = 0;
    this.sound.play('buy');
    this.updateAmmoDisplay();
    this.updateHUD();
    this.closeBuy();
  }

  // --------------------------------------------------------
  //  INPUT
  // --------------------------------------------------------
  setupInput() {
    // Joystick zone (left side)
    const jZone = document.createElement('div');
    jZone.id = 'joy-zone';
    jZone.style.cssText = 'position:fixed;bottom:0;left:0;width:40%;height:45%;z-index:250';
    document.getElementById('ui').appendChild(jZone);

    const jBase = document.createElement('div');
    jBase.id = 'joy-base';
    jBase.style.cssText = 'position:absolute;width:100px;height:100px;border-radius:50%;background:#ffffff0a;border:2px solid #ffffff15;pointer-events:none;transform:translate(-50%,-50%);display:none';
    jZone.appendChild(jBase);

    const jKnob = document.createElement('div');
    jKnob.id = 'joy-knob';
    jKnob.style.cssText = 'position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#ffffff2a,#ffffff0a);border:2px solid #ffffff33;pointer-events:none;transform:translate(-50%,-50%);display:none';
    jZone.appendChild(jKnob);

    jZone.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      this.joyActive = true;
      this.joyTouchId = t.identifier;
      this.joyBaseX = t.clientX;
      this.joyBaseY = t.clientY;
      jBase.style.display = 'block';
      jKnob.style.display = 'block';
      jBase.style.left = t.clientX+'px';
      jBase.style.top = t.clientY+'px';
      jKnob.style.left = t.clientX+'px';
      jKnob.style.top = t.clientY+'px';
    }, {passive:false});

    jZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === this.joyTouchId) {
          const dx = t.clientX - this.joyBaseX;
          const dy = t.clientY - this.joyBaseY;
          const dist = Math.sqrt(dx*dx+dy*dy);
          const maxD = 45;
          const clamped = Math.min(dist, maxD);
          const a = Math.atan2(dy, dx);
          jKnob.style.left = (this.joyBaseX + Math.cos(a)*clamped)+'px';
          jKnob.style.top = (this.joyBaseY + Math.sin(a)*clamped)+'px';
          this.moveX = dx/maxD;
          this.moveZ = dy/maxD;
          const m = Math.sqrt(this.moveX*this.moveX+this.moveZ*this.moveZ);
          if(m>1){this.moveX/=m;this.moveZ/=m;}
        }
      }
    }, {passive:false});

    const endJoy = e => {
      for(const t of e.changedTouches){
        if(t.identifier===this.joyTouchId){
          this.joyActive=false;this.joyTouchId=null;this.moveX=0;this.moveZ=0;
          jBase.style.display='none';jKnob.style.display='none';
        }
      }
    };
    jZone.addEventListener('touchend',endJoy);
    jZone.addEventListener('touchcancel',endJoy);

    // Look zone (right side)
    const lZone = document.createElement('div');
    lZone.style.cssText = 'position:fixed;top:0;right:0;width:60%;height:100%;z-index:250';
    document.getElementById('ui').appendChild(lZone);

    let lastLookX = 0, lastLookY = 0;
    lZone.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      this.aimActive = true;
      this.aimTouchId = t.identifier;
      lastLookX = t.clientX;
      lastLookY = t.clientY;
      this.shooting = true;
    }, {passive:false});

    lZone.addEventListener('touchmove', e => {
      e.preventDefault();
      for(const t of e.changedTouches){
        if(t.identifier===this.aimTouchId){
          const dx = t.clientX - lastLookX;
          const dy = t.clientY - lastLookY;
          this.camYaw -= dx * this.sensitivity;
          this.camPitch = Math.max(-1.2, Math.min(1.2, this.camPitch - dy * this.sensitivity));
          lastLookX = t.clientX;
          lastLookY = t.clientY;
        }
      }
    }, {passive:false});

    const endAim = e => {
      for(const t of e.changedTouches){
        if(t.identifier===this.aimTouchId){
          this.aimActive=false;this.aimTouchId=null;this.shooting=false;
        }
      }
    };
    lZone.addEventListener('touchend',endAim);
    lZone.addEventListener('touchcancel',endAim);

    // Mouse
    this.renderer.domElement.addEventListener('mousedown', e => {
      this.shooting = true;
      document.getElementById('crosshair').style.display = 'block';
    });
    this.renderer.domElement.addEventListener('mouseup', () => {
      this.shooting = false;
    });
    this.renderer.domElement.addEventListener('mousemove', e => {
      if (document.pointerLockElement === this.renderer.domElement) {
        this.camYaw -= e.movementX * this.sensitivity;
        this.camPitch = Math.max(-1.2, Math.min(1.2, this.camPitch - e.movementY * this.sensitivity));
      }
    });
    this.renderer.domElement.addEventListener('click', () => {
      if (!this.roundActive) return;
      this.renderer.domElement.requestPointerLock();
    });

    // Keyboard
    window.addEventListener('keydown', e => {
      this.keys[e.key.toLowerCase()] = true;
      if (e.key === 'Escape') {
        if (document.getElementById('buy-menu').style.display === 'flex') this.closeBuy();
        else this.togglePause();
      }
      if (e.key.toLowerCase() === 'b') {
        if (document.getElementById('buy-menu').style.display === 'flex') this.closeBuy();
        else this.openBuy();
      }
      if (e.key.toLowerCase() === 'r') this.startReload();
    });
    window.addEventListener('keyup', e => { this.keys[e.key.toLowerCase()] = false; });

    // Resize
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  // --------------------------------------------------------
  //  GAME LOOP
  // --------------------------------------------------------
  animate() {
    requestAnimationFrame(() => this.animate());
    const dt = Math.min(this.clock.getDelta(), 0.05);

    if (!this.roundActive || this.hp <= 0) {
      this.renderer.render(this.scene, this.camera);
      return;
    }

    // Player movement
    let mx = 0, mz = 0;
    if (this.keys['w']||this.keys['ц']) mz = -1;
    if (this.keys['s']||this.keys['ы']) mz = 1;
    if (this.keys['a']||this.keys['ф']) mx = -1;
    if (this.keys['d']||this.keys['в']) mx = 1;
    if (this.joyActive) { mx = this.moveX; mz = this.moveZ; }

    // Rotate by camera yaw
    const cos = Math.cos(this.camYaw), sin = Math.sin(this.camYaw);
    const rmx = mx * cos - mz * sin;
    const rmz = mx * sin + mz * cos;

    const len = Math.sqrt(rmx*rmx+rmz*rmz);
    const speed = 5.5;
    if (len > 0.1) {
      const nx = this.playerPos.x + (rmx/len)*speed*dt;
      const nz = this.playerPos.z + (rmz/len)*speed*dt;
      let blocked = false;
      for (const o of this.obstacles) {
        if (nx+0.4>o.x && nx-0.4<o.x+o.w && nz+0.4>o.z && nz-0.4<o.z+o.d) {
          blocked = true; break;
        }
      }
      const hs = MAPS[this.mapName].size/2 - 1;
      if (!blocked && Math.abs(nx)<hs && Math.abs(nz)<hs) {
        this.playerPos.x = nx;
        this.playerPos.z = nz;
      }
    }

    // Recoil recovery
    this.recoilX *= 0.9;
    this.recoilY *= 0.92;
    if (this.recoilIndex > 0 && performance.now() - this.lastShot > 200) {
      this.recoilIndex = Math.max(0, this.recoilIndex - 1);
    }

    // Camera
    const eyeY = 1.6;
    this.camera.position.set(this.playerPos.x, eyeY, this.playerPos.z);
    this.camera.rotation.set(this.camPitch - this.recoilY*0.01, this.camYaw + this.recoilX*0.005, 0, 'YXZ');

    // Auto-fire for auto weapons
    if (this.shooting && WEAPONS[this.weapon].auto) {
      this.playerShoot();
    }

    // Reload
    if (this.reloading && performance.now() - this.reloadStart > WEAPONS[this.weapon].reload) {
      this.finishReload();
    }

    // Bullets
    for (let i = this.bullets.length-1; i >= 0; i--) {
      const b = this.bullets[i];
      b.mesh.position.add(b.velocity.clone().multiplyScalar(dt));
      b.life -= dt;

      if (b.life <= 0 || Math.abs(b.mesh.position.x) > 50 || Math.abs(b.mesh.position.z) > 50) {
        this.scene.remove(b.mesh);
        this.bullets.splice(i, 1);
        continue;
      }

      // Hit ground
      if (b.mesh.position.y < 0.1) {
        this.scene.remove(b.mesh);
        this.bullets.splice(i, 1);
        continue;
      }

      // Hit obstacles
      let hit = false;
      for (const o of this.obstacles) {
        if (b.mesh.position.x>o.x && b.mesh.position.x<o.x+o.w &&
            b.mesh.position.z>o.z && b.mesh.position.z<o.z+o.d) {
          this.scene.remove(b.mesh);
          this.bullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;

      // Player bullets hit bots
      if (b.owner === 'player') {
        for (const bot of this.bots) {
          if (!bot.alive) continue;
          const d = b.mesh.position.distanceTo(bot.mesh.position);
          if (d < 0.8) {
            this.damageBot(bot, b.damage);
            this.showHitmarker();
            this.sound.play('hit');
            this.scene.remove(b.mesh);
            this.bullets.splice(i, 1);
            break;
          }
        }
      }

      // Enemy bullets hit player
      if (b.owner === 'enemy') {
        const d = b.mesh.position.distanceTo(this.playerPos);
        if (d < 0.8) {
          this.dealDamage(b.damage);
          this.scene.remove(b.mesh);
          this.bullets.splice(i, 1);
        }
      }
    }

    // Update bots
    this.updateBots(dt);

    // Particles
    for (let i = this.particles.length-1; i >= 0; i--) {
      const p = this.particles[i];
      p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
      p.velocity.y -= 15 * dt;
      p.life -= dt;
      p.mesh.material.opacity = Math.max(0, p.life);
      if (p.life <= 0) {
        this.scene.remove(p.mesh);
        this.particles.splice(i, 1);
      }
    }

    // Round timer
    this.roundTimer -= dt;
    if (this.roundTimer <= 0) {
      this.endRound(this.team === 'ct' ? 't' : 'ct');
    }

    this.updateHUD();
    this.renderer.render(this.scene, this.camera);
  }

  // --------------------------------------------------------
  //  UI
  // --------------------------------------------------------
  updateHUD() {
    document.getElementById('hud-hp').textContent = Math.max(0, this.hp);
    document.getElementById('hud-armor').textContent = this.armor;
    document.getElementById('hud-ct').textContent = `CT: ${this.ctScore}`;
    document.getElementById('hud-t').textContent = `T: ${this.tScore}`;
    const mins = Math.floor(this.roundTimer/60);
    const secs = Math.floor(this.roundTimer%60);
    document.getElementById('hud-round').textContent = `Раунд ${this.round} | ${mins}:${secs.toString().padStart(2,'0')}`;
  }

  updateAmmoDisplay() {
    document.getElementById('hud-ammo').textContent = this.ammo;
    document.getElementById('hud-reserve').textContent = `/ ${this.reserve}`;
  }

  showHitmarker() {
    const hm = document.getElementById('hitmarker');
    hm.classList.add('show');
    setTimeout(() => hm.classList.remove('show'), 150);
  }

  addKillFeed(msg) {
    const feed = document.getElementById('killfeed');
    const el = document.createElement('div');
    el.className = 'kf-msg';
    el.textContent = msg;
    feed.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  showBanner(text, sub) {
    const b = document.getElementById('round-banner');
    const s = document.getElementById('round-sub');
    b.textContent = text;
    s.textContent = sub || '';
    b.style.opacity = '1';
    s.style.opacity = '1';
    setTimeout(() => { b.style.opacity = '0'; s.style.opacity = '0'; }, 3000);
  }

  togglePause() {
    // Simple pause toggle
  }

  // --------------------------------------------------------
  //  GAME FLOW
  // --------------------------------------------------------
  start(mode) {
    this.mode = mode;
    this.round = 0;
    this.ctScore = 0;
    this.tScore = 0;
    this.kills = 0;
    this.deaths = 0;
    this.money = 800;
    this.weapon = 'usp';
    this.ammo = 12;
    this.reserve = 24;
    this.hp = 100;
    this.armor = 0;

    // Pick map
    const mapNames = Object.keys(MAPS);
    this.mapName = mapNames[Math.floor(Math.random()*mapNames.length)];
    this.loadMap(this.mapName);

    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('crosshair').style.display = 'block';

    this.buyTime = true;
    this.showBanner('Магазин', 'Нажмите B для покупки оружия');
    this.openBuy();

    setTimeout(() => {
      this.closeBuy();
      this.buyTime = false;
      this.startRound();
    }, 15000);
  }

  restart() {
    document.getElementById('gameover').style.display = 'none';
    this.start(this.mode);
  }

  backToMenu() {
    this.roundActive = false;
    this.bots.forEach(b => { if(b.mesh.parent) this.scene.remove(b.mesh); });
    this.bots = [];
    this.bullets.forEach(b => { if(b.mesh.parent) this.scene.remove(b.mesh); });
    this.bullets = [];
    document.getElementById('gameover').style.display = 'none';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('crosshair').style.display = 'none';
    document.getElementById('main-menu').style.display = 'flex';
  }

  resume() {
    document.getElementById('pause').style.display = 'none';
  }
}

window.G = G;
G.init();
