plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ironsquad.game'
    compileSdk 34

    defaultConfig {
        applicationId "com.ironsquad.game"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }

    aaptOptions {
        noCompress "wav", "mp3", "ogg", "png", "jpg", "glb", "gltf", "js"
    }
}

dependencies {
}
