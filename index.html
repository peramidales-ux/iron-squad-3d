  static createCrate(size = 1.5) {
    const g = new THREE.Group();
    const woodMat = new THREE.MeshStandardMaterial({color: 0x8B7355, roughness: 0.9});
    
    const box = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), woodMat);
    box.castShadow = true;
    box.receiveShadow = true;
    g.add(box);

    // Planks
    const plankMat = new THREE.MeshStandardMaterial({color: 0x7a6245, roughness: 0.85});
    for (let i = 0; i < 3; i++) {
      const plank = new THREE.Mesh(
        new THREE.BoxGeometry(size + 0.02, 0.03, 0.06),
        plankMat
      );
      plank.position.y = -size/3 + i * size/3;
      plank.position.z = size/2 + 0.01;
      g.add(plank);
    }

    // Nails
    const nailMat = new THREE.MeshStandardMaterial({color: 0x666666, metalness: 0.8});
    for (let x = -1; x <= 1; x += 2) {
      for (let y = -1; y <= 1; y += 2) {
        const nail = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.02, 4), nailMat);
        nail.position.set(x * size * 0.35, y * size * 0.3, size/2 + 0.02);
        g.add(nail);
      }
    }

    // Metal corners
    const cornerMat = new THREE.MeshStandardMaterial({color: 0x444444, metalness: 0.6, roughness: 0.4});
    const cs = size/2;
    [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([sx,sz]) => {
      const corner = new THREE.Mesh(new THREE.BoxGeometry(0.04, size*0.8, 0.04), cornerMat);
      corner.position.set(sx*cs, 0, sz*cs);
      g.add(corner);
    });

    return g;
  }

  static createBarrel() {
    const g = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({color: 0x3a5a3a, roughness: 0.6, metalness: 0.3});
    
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 1.2, 16), bodyMat);
    body.castShadow = true;
    g.add(body);

    // Ridges
    const ridgeMat = new THREE.MeshStandardMaterial({color: 0x2a4a2a, metalness: 0.4});
    for (let i = -1; i <= 1; i++) {
      const ridge = new THREE.Mesh(new THREE.TorusGeometry(0.36, 0.015, 8, 16), ridgeMat);
      ridge.position.y = i * 0.3;
      ridge.rotation.x = Math.PI/2;
      g.add(ridge);
    }

    // Top rim
    const rim = new THREE.Mesh(new THREE.TorusGeometry(0.33, 0.02, 8, 16), ridgeMat);
    rim.position.y = 0.6;
    rim.rotation.x = Math.PI/2;
    g.add(rim);

    // Hazard stripe
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(0.72, 0.08, 0.01),
      new THREE.MeshStandardMaterial({color: 0xddaa00, roughness: 0.5})
    );
    stripe.position.y = 0.2;
    stripe.position.z = 0.36;
    g.add(stripe);

    return g;
  }

  static createSandbag() {
    const g = new THREE.Group();
    const bagMat = new THREE.MeshStandardMaterial({color: 0xc2b280, roughness: 0.9});
    
    // Stack of sandbags
    for (let row = 0; row < 3; row++) {
      const count = 3 - row;
      for (let i = 0; i < count; i++) {
        const bag = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, 0.2, 0.3),
          bagMat
        );
        bag.position.set(
          (i - (count-1)/2) * 0.52,
          row * 0.22,
          0
        );
        bag.rotation.y = (Math.random() - 0.5) * 0.1;
        bag.castShadow = true;
        g.add(bag);
      }
    }
    return g;
  }

  static createWall(w, h, d, color = 0x8a8a7a) {
    const g = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({color, roughness: 0.8});
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    wall.position.y = h/2;
    wall.castShadow = true;
    wall.receiveShadow = true;
    g.add(wall);

    // Brick pattern
    if (w > 2 || d > 2) {
      const brickMat = new THREE.MeshStandardMaterial({color: 0x9a4a3a, roughness: 0.85});
      for (let y = 0; y < h; y += 0.3) {
        for (let x = -w/2 + 0.2; x < w/2; x += 0.5) {
          if (Math.random() > 0.7) continue;
          const brick = new THREE.Mesh(
            new THREE.BoxGeometry(0.22, 0.1, d + 0.02),
            brickMat
          );
          brick.position.set(x + (Math.floor(y/0.3)%2)*0.25, y + 0.15, 0);
          g.add(brick);
        }
      }
    }
    return g;
  }

  static createSkybox() {
    const g = new THREE.Group();
    
    // Sky dome
    const skyGeo = new THREE.SphereGeometry(150, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        topColor: {value: new THREE.Color(0x0066cc)},
        bottomColor: {value: new THREE.Color(0x88bbee)},
        offset: {value: 20},
        exponent: {value: 0.4}
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition + offset).y;
          gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
        }
      `
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    g.add(sky);

    // Sun
    const sunGeo = new THREE.SphereGeometry(3, 16, 8);
    const sunMat = new THREE.MeshBasicMaterial({color: 0xffffaa});
    const sun = new THREE.Mesh(sunGeo, sunMat);
    sun.position.set(50, 80, 30);
    g.add(sun);

    return g;
  }
}

// ========== SOUND ENGINE ==========
class SoundEngine {
  constructor() { this.ctx = null; this.sounds = {}; }
  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  ensure() {
    if (!this.ctx) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  }
  play(type) {
    this.ensure();
    const c = this.ctx, now = c.currentTime;
    const o = c.createOscillator();
    const g = c.createGain();
    const f = c.createBiquadFilter();
    o.connect(f); f.connect(g); g.connect(c.destination);
    f.type = 'lowpass';

    const presets = {
      rifle:  {wave:'sawtooth', f0:200,f1:80,  d:0.12, g0:0.3,  freq:2000},
      smg:    {wave:'square',   f0:300,f1:100, d:0.07, g0:0.2,  freq:3000},
      pistol: {wave:'triangle', f0:400,f1:150, d:0.1,  g0:0.25, freq:2500},
      deagle: {wave:'sawtooth', f0:150,f1:40,  d:0.18, g0:0.4,  freq:1500},
      awp:    {wave:'sawtooth', f0:100,f1:20,  d:0.35, g0:0.5,  freq:800},
      sniper: {wave:'triangle', f0:180,f1:50,  d:0.25, g0:0.35, freq:1200},
      shotgun:{wave:'sawtooth', f0:120,f1:30,  d:0.25, g0:0.5,  freq:1000},
      mg:     {wave:'sawtooth', f0:160,f1:60,  d:0.12, g0:0.3,  freq:1800},
      hit:    {wave:'sine',     f0:800,f1:400, d:0.06, g0:0.15, freq:5000},
      kill:   {wave:'sine',     f0:600,f1:900, d:0.12, g0:0.2,  freq:5000},
    };
    const p = presets[type] || presets.pistol;
    o.type = p.wave;
    o.frequency.setValueAtTime(p.f0, now);
    o.frequency.exponentialRampToValueAtTime(p.f1, now + p.d);
    f.frequency.value = p.freq;
    g.gain.setValueAtTime(p.g0, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + p.d);
    o.start(now); o.stop(now + p.d);
  }
}

// ========== BOTS ==========
function spawnBot(team, weaponType) {
  const spawn = team === 'ct' ? {x:0,z:30} : {x:0,z:-30};
  const bx = spawn.x + (Math.random()-0.5)*8;
  const bz = spawn.z + (Math.random()-0.5)*8;

  const mesh = ModelFactory.createCharacter(team);
  mesh.position.set(bx, 0, bz);
  G.scene.add(mesh);

  const w = WEAPONS[weaponType] || WEAPONS.ak47;
  const diff = G.bots.length < 3 ? 0.3 : (G.bots.length < 6 ? 0.5 : 0.7);

  const bot = {
    mesh, team, weapon: weaponType,
    hp: 100, maxHp: 100, speed: 2.5 + Math.random(),
    damage: w.dmg, fireRate: w.rate, lastShot: 0, ammo: w.mag,
    state: 'patrol', difficulty: diff,
    patrolTarget: new THREE.Vector3(
      (Math.random()-0.5)*CFG.MAP_SIZE*0.6, 0,
      (Math.random()-0.5)*CFG.MAP_SIZE*0.6
    ),
    stateTimer: 0, alive: true
  };
  G.bots.push(bot);
}

function updateBots(dt) {
  const now = performance.now();
  for (const bot of G.bots) {
    if (!bot.alive) continue;
    const dx = G.playerPos.x - bot.mesh.position.x;
    const dz = G.playerPos.z - bot.mesh.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const angle = Math.atan2(dx, dz);

    if (dist < 25 && lineOfSight(bot.mesh.position, G.playerPos)) bot.state = 'combat';
    else if (dist < 40) bot.state = 'chase';
    else bot.state = 'patrol';

    bot.mesh.rotation.y = angle;
    let moveAngle = angle, speed = bot.speed;

    if (bot.state === 'patrol') {
      const tx = bot.patrolTarget.x - bot.mesh.position.x;
      const tz = bot.patrolTarget.z - bot.mesh.position.z;
      if (Math.sqrt(tx*tx+tz*tz) < 3) {
        bot.patrolTarget.set((Math.random()-0.5)*CFG.MAP_SIZE*0.6, 0, (Math.random()-0.5)*CFG.MAP_SIZE*0.6);
      }
      moveAngle = Math.atan2(tx, tz);
      speed = bot.speed * 0.6;
    } else if (bot.state === 'combat') {
      bot.stateTimer += dt;
      if (bot.stateTimer > 2) bot.stateTimer = 0;
      moveAngle = angle + Math.PI/2 * (bot.stateTimer < 1 ? 1 : -1);
      speed = bot.speed * 0.4;

      if (now - bot.lastShot > bot.fireRate / bot.difficulty && bot.ammo > 0) {
        const origin = bot.mesh.position.clone(); origin.y += 1.2;
        const dir = new THREE.Vector3(dx, 0, dz).normalize();
        dir.x += (Math.random()-0.5)*(1-bot.difficulty)*0.2;
        dir.z += (Math.random()-0.5)*(1-bot.difficulty)*0.2;
        dir.normalize();
        fireBullet(origin, dir, 'enemy', bot.damage);
        bot.lastShot = now;
        bot.ammo--;
        G.sound.play(WEAPONS[bot.weapon]?.snd || 'rifle');
      } else if (bot.ammo <= 0) {
        bot.ammo = WEAPONS[bot.weapon]?.mag || 30;
      }
    }

    const mx = Math.sin(moveAngle) * speed * dt;
    const mz = Math.cos(moveAngle) * speed * dt;
    const nx = bot.mesh.position.x + mx;
    const nz = bot.mesh.position.z + mz;
    let blocked = false;
    for (const o of G.obstacles) {
      if (nx+0.4>o.x && nx-0.4<o.x+o.w && nz+0.4>o.z && nz-0.4<o.z+o.d) { blocked=true; break; }
    }
    const hs = CFG.MAP_SIZE/2 - 2;
    if (!blocked && Math.abs(nx)<hs && Math.abs(nz)<hs) {
      bot.mesh.position.x = nx; bot.mesh.position.z = nz;
    } else {
      bot.patrolTarget.set((Math.random()-0.5)*CFG.MAP_SIZE*0.6, 0, (Math.random()-0.5)*CFG.MAP_SIZE*0.6);
    }
  }
}

function lineOfSight(from, to) {
  const dx = to.x-from.x, dz = to.z-from.z;
  const steps = Math.ceil(Math.sqrt(dx*dx+dz*dz) / 2);
  for (let i = 1; i < steps; i++) {
    const t = i/steps;
    const px = from.x+dx*t, pz = from.z+dz*t;
    for (const o of G.obstacles) {
      if (px>o.x && px<o.x+o.w && pz>o.z && pz<o.z+o.d) return false;
    }
  }
  return true;
}

// ========== BULLETS ==========
function fireBullet(origin, dir, owner, damage) {
  const w = WEAPONS[G.weapon] || WEAPONS.pistol;
  const pellets = w.pellets || 1;
  for (let i = 0; i < pellets; i++) {
    const d = dir.clone();
    if (w.spread) {
      d.x += (Math.random()-0.5)*w.spread;
      d.z += (Math.random()-0.5)*w.spread;
      d.normalize();
    }
    const geo = new THREE.SphereGeometry(0.05, 4, 4);
    const mat = new THREE.MeshBasicMaterial({color: owner==='player'?0xffff00:0xff4444});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(origin);
    G.scene.add(mesh);
    G.bullets.push({mesh, velocity: d.multiplyScalar(w.spd || 40), damage, owner, life: 2});
  }
}

// ========== SHOOTING ==========
function playerShoot() {
  if (G.reloading || G.hp <= 0) return;
  const w = WEAPONS[G.weapon];
  const now = performance.now();
  if (now - G.lastShot < w.rate) return;
  if (G.ammo <= 0) { startReload(); return; }

  const origin = G.playerPos.clone(); origin.y += CFG.PLAYER_HEIGHT;
  const dir = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(G.camPitch, G.camYaw, 0, 'YXZ'));
  fireBullet(origin, dir, 'player', w.dmg);

  G.recoilY += w.rY;
  G.recoilX += (Math.random()-0.5)*w.rX;
  G.recoilIdx++;
  G.lastShot = now;
  G.ammo--;
  G.sound.play(w.snd);

  // Muzzle flash
  const mf = new THREE.PointLight(0xffaa00, 2, 5);
  mf.position.copy(origin);
  G.scene.add(mf);
  setTimeout(() => G.scene.remove(mf), 40);
}

function startReload() {
  if (G.reloading) return;
  const w = WEAPONS[G.weapon];
  if (G.reserve <= 0 || G.ammo >= w.mag) return;
  G.reloading = true;
  G.reloadStart = performance.now();
}

// ========== DAMAGE ==========
function dealDamage(dmg) {
  if (G.armor > 0) {
    const absorbed = Math.min(G.armor, dmg * 0.5);
    G.armor -= absorbed; dmg -= absorbed;
  }
  G.hp -= dmg;
  // Vignette effect via renderer background flash
  if (G.hp <= 0) { G.hp = 0; G.deaths++; setTimeout(respawn, 2000); }
}

function damageBot(bot, dmg) {
  bot.hp -= dmg;
  bot.mesh.children[0].material.emissive = new THREE.Color(0xff0000);
  bot.mesh.children[0].material.emissiveIntensity = 0.5;
  setTimeout(() => { if(bot.mesh.children[0]) bot.mesh.children[0].material.emissiveIntensity = 0; }, 100);
  if (bot.hp <= 0) killBot(bot);
}

function killBot(bot) {
  bot.alive = false;
  G.kills++;
  G.money += 300;
  G.sound.play('kill');
  // Death particles
  for (let i = 0; i < 10; i++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4), new THREE.MeshBasicMaterial({color:0xff3333,transparent:true}));
    p.position.copy(bot.mesh.position); p.position.y += 1;
    G.scene.add(p);
    G.particles.push({mesh:p, velocity:new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3+1, (Math.random()-0.5)*4), life:1});
  }
  G.scene.remove(bot.mesh);
  const names = {ct:'CT',t:'T'};
  addKillFeed(`${names[bot.team]} eliminated`);
}

function respawn() {
  G.hp = 100; G.armor = 0;
  const spawn = G.team === 'ct' ? {x:0,z:30} : {x:0,z:-30};
  G.playerPos.set(spawn.x+(Math.random()-0.5)*3, 0, spawn.z+(Math.random()-0.5)*3);
  G.camPitch = 0; G.camYaw = 0;
  G.recoilX = 0; G.recoilY = 0; G.recoilIdx = 0;
}

// ========== ROUNDS ==========
function startRound() {
  G.round++;
  G.roundActive = true;
  G.roundTimer = CFG.ROUND_TIME;

  G.bots.forEach(b => { if(b.mesh.parent) G.scene.remove(b.mesh); });
  G.bots = [];
  G.bullets.forEach(b => { if(b.mesh.parent) G.scene.remove(b.mesh); });
  G.bullets = [];

  const tW = ['ak47','ak47','galil','mac10'];
  const cW = ['m4a4','m4a4','famas','mp9'];
  for (let i = 0; i < CFG.BOT_COUNT; i++) spawnBot('t', tW[i%tW.length]);
  for (let i = 0; i < CFG.BOT_COUNT; i++) spawnBot('ct', cW[i%cW.length]);
  respawn();
  showBanner(`РАУНД ${G.round}`, `${G.mode==='defusal'?'Дефуз бомбы':'Уничтожь противников'}`);
  G.sound.play('kill');
}

function endRound(winner) {
  if (!G.roundActive) return;
  G.roundActive = false;
  if (winner === 'ct') G.ctScore++; else G.tScore++;
  G.money += winner === G.team ? 3250 : 1400;
  showBanner(`${winner.toUpperCase()} ПОБЕДИЛИ`, `Счёт: CT ${G.ctScore} — ${G.tScore} T`);
  if (G.ctScore >= 13 || G.tScore >= 13) { setTimeout(gameOver, 3000); return; }
  setTimeout(() => {
    G.buyTime = true;
    showBanner('Магазин', 'B для покупки');
    setTimeout(() => { G.buyTime = false; startRound(); }, CFG.BUY_TIME * 1000);
  }, 3000);
}

        <div style="color:#e6edf3;font-size:11px;font-weight:600">${w.name}</div>
        <div style="color:#8b949e;font-size:9px;margin-top:2px">Урон:${w.dmg} Маг:${w.mag}</div>
        <div style="color:#e3b341;font-size:10px;margin-top:3px;font-weight:600">$${w.price}</div>
      </div>`;
    }
    html += '</div>';
  }
  html += '<button onclick="closeBuy()" style="margin-top:16px;padding:10px 32px;background:#da3633;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">ЗАКРЫТЬ [B]</button>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}
window.closeBuy = function() { document.getElementById('buy-overlay')?.remove(); };
window.buyWeapon = function(key) {
  const w = WEAPONS[key];
  if (G.money < w.price) return;
  G.money -= w.price;
  G.weapon = key; G.ammo = w.mag; G.reserve = w.res;
  G.reloading = false; G.recoilIdx = 0;
  G.sound.play('kill');
  closeBuy();
  updateWeaponModel();
  updateHUD();
};

// ========== INPUT ==========
function setupInput() {
  // Keyboard
  window.addEventListener('keydown', e => {
    G.keys[e.key.toLowerCase()] = true;
    if (e.key === 'Escape') { closeBuy(); }
    if (e.key.toLowerCase() === 'b') {
      document.getElementById('buy-overlay') ? closeBuy() : openBuy();
    }
    if (e.key.toLowerCase() === 'r') startReload();
  });
  window.addEventListener('keyup', e => { G.keys[e.key.toLowerCase()] = false; });

  // Mouse
  G.renderer.domElement.addEventListener('mousedown', () => { G.shooting = true; });
  G.renderer.domElement.addEventListener('mouseup', () => { G.shooting = false; });
  G.renderer.domElement.addEventListener('mousemove', e => {
    if (document.pointerLockElement === G.renderer.domElement) {
      G.camYaw -= e.movementX * CFG.SENSITIVITY;
      G.camPitch = Math.max(-1.2, Math.min(1.2, G.camPitch - e.movementY * CFG.SENSITIVITY));
    }
  });

  // Touch - Joystick (left side)
  const jZone = document.createElement('div');
  jZone.style.cssText = 'position:fixed;bottom:0;left:0;width:40%;height:45%;z-index:200';
  document.body.appendChild(jZone);

  const jBase = document.createElement('div');
  jBase.style.cssText = 'position:absolute;width:100px;height:100px;border-radius:50%;background:#ffffff0a;border:2px solid #ffffff15;pointer-events:none;transform:translate(-50%,-50%);display:none';
  jZone.appendChild(jBase);
  const jKnob = document.createElement('div');
  jKnob.style.cssText = 'position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#ffffff2a,#ffffff0a);border:2px solid #ffffff33;pointer-events:none;transform:translate(-50%,-50%);display:none';
  jZone.appendChild(jKnob);

  jZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    G.joyActive = true; G.joyTouchId = t.identifier;
    G.joyBX = t.clientX; G.joyBY = t.clientY;
    jBase.style.display = 'block'; jKnob.style.display = 'block';
    jBase.style.left = t.clientX+'px'; jBase.style.top = t.clientY+'px';
    jKnob.style.left = t.clientX+'px'; jKnob.style.top = t.clientY+'px';
  }, {passive:false});
  jZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === G.joyTouchId) {
        const dx = t.clientX-G.joyBX, dy = t.clientY-G.joyBY;
        const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 45);
        const a = Math.atan2(dy, dx);
        jKnob.style.left = (G.joyBX+Math.cos(a)*dist)+'px';
        jKnob.style.top = (G.joyBY+Math.sin(a)*dist)+'px';
        G.moveX = dx/45; G.moveZ = dy/45;
        const m = Math.sqrt(G.moveX*G.moveX+G.moveZ*G.moveZ);
        if(m>1){G.moveX/=m;G.moveZ/=m;}
      }
    }
  }, {passive:false});
  const endJoy = e => { for(const t of e.changedTouches){if(t.identifier===G.joyTouchId){G.joyActive=false;G.moveX=0;G.moveZ=0;jBase.style.display='none';jKnob.style.display='none';}}};
  jZone.addEventListener('touchend',endJoy); jZone.addEventListener('touchcancel',endJoy);

  // Touch - Look (right side)
  const lZone = document.createElement('div');
  lZone.style.cssText = 'position:fixed;top:0;right:0;width:60%;height:100%;z-index:200';
  document.body.appendChild(lZone);
  lZone.addEventListener('touchstart', e => {
    e.preventDefault(); const t = e.changedTouches[0];
    G.aimActive=true;G.aimTouchId=t.identifier;G.shooting=true;
    G.lastMX=t.clientX;G.lastMY=t.clientY;
  }, {passive:false});
  lZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for(const t of e.changedTouches){if(t.identifier===G.aimTouchId){
      G.camYaw -= (t.clientX-G.lastMX)*CFG.SENSITIVITY;
      G.camPitch = Math.max(-1.2,Math.min(1.2,G.camPitch-(t.clientY-G.lastMY)*CFG.SENSITIVITY));
      G.lastMX=t.clientX;G.lastMY=t.clientY;
    }}
  }, {passive:false});
  const endAim = e => { for(const t of e.changedTouches){if(t.identifier===G.aimTouchId){G.aimActive=false;G.shooting=false;}}};
  lZone.addEventListener('touchend',endAim); lZone.addEventListener('touchcancel',endAim);

  window.addEventListener('resize', () => {
    G.camera.aspect = window.innerWidth/window.innerHeight;
    G.camera.updateProjectionMatrix();
    G.renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ========== WEAPON MODEL ==========
function updateWeaponModel() {
  while(G.weaponGroup.children.length) G.weaponGroup.remove(G.weaponGroup.children[0]);
  const model = ModelFactory.createWeapon(G.weapon);
  model.scale.set(0.8, 0.8, 0.8);
  G.weaponGroup.add(model);
}

// ========== HUD ==========
function updateHUD() {
  // Create HUD elements if not exists
  let hud = document.getElementById('game-hud');
  if (!hud) {
    hud = document.createElement('div');
    hud.id = 'game-hud';
    hud.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:100;font-family:system-ui';
    hud.innerHTML = `
      <div style="position:absolute;top:8px;left:16px;display:flex;gap:16px">
        <span id="h-ct" style="color:#58a6ff;font-size:18px;font-weight:700">CT: 0</span>
        <span id="h-round" style="color:#8b949e;font-size:12px">Раунд 1</span>
        <span id="h-t" style="color:#e3b341;font-size:18px;font-weight:700">T: 0</span>
      </div>
      <div style="position:absolute;bottom:12px;left:16px">
        <div style="color:#f85149;font-size:22px;font-weight:700" id="h-hp">100</div>
        <div style="color:#e3b341;font-size:14px" id="h-armor">🛡 0</div>
      </div>
      <div style="position:absolute;bottom:12px;right:16px;text-align:right">
        <div style="color:#e6edf3;font-size:28px;font-weight:700" id="h-ammo">12</div>
        <div style="color:#8b949e;font-size:12px" id="h-res">/ 24</div>
      </div>
      <div id="h-money" style="position:absolute;top:8px;right:16px;color:#e3b341;font-size:14px;font-weight:600">$800</div>
      <div id="h-killfeed" style="position:absolute;top:36px;right:12px;display:flex;flex-direction:column;gap:3px"></div>
      <div id="h-banner" style="position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);color:#e6edf3;font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:3px;opacity:0;transition:opacity .5s;text-shadow:0 0 20px #000;pointer-events:none"></div>
      <div id="h-sub" style="position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);color:#8b949e;font-size:13px;opacity:0;transition:opacity .5s;pointer-events:none"></div>
      <div id="h-crosshair" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none">
        <div style="position:absolute;width:2px;height:8px;background:#0f0;left:calc(50% - 1px);top:-12px"></div>
        <div style="position:absolute;width:2px;height:8px;background:#0f0;left:calc(50% - 1px);bottom:-12px"></div>
        <div style="position:absolute;width:8px;height:2px;background:#0f0;top:calc(50% - 1px);left:-12px"></div>
        <div style="position:absolute;width:8px;height:2px;background:#0f0;top:calc(50% - 1px);right:-12px"></div>
        <div style="position:absolute;width:2px;height:2px;background:#0f0;border-radius:50%;top:calc(50% - 1px);left:calc(50% - 1px)"></div>
      </div>
    `;
    document.body.appendChild(hud);
  }
  document.getElementById('h-hp').textContent = Math.max(0, G.hp);
  document.getElementById('h-armor').textContent = `🛡 ${G.armor}`;
  document.getElementById('h-ct').textContent = `CT: ${G.ctScore}`;
  document.getElementById('h-t').textContent = `T: ${G.tScore}`;
  const mins = Math.floor(G.roundTimer/60);
  const secs = Math.floor(G.roundTimer%60);
  document.getElementById('h-round').textContent = `Раунд ${G.round} | ${mins}:${secs.toString().padStart(2,'0')}`;
  document.getElementById('h-money').textContent = `$${G.money}`;
  document.getElementById('h-ammo').textContent = G.ammo;
  document.getElementById('h-res').textContent = `/ ${G.reserve}`;
}

function addKillFeed(msg) {
  const kf = document.getElementById('h-killfeed');
  if (!kf) return;
  const el = document.createElement('div');
  el.style.cssText = 'font-size:11px;color:#8b949e;background:#161b22aa;padding:3px 8px;border-radius:4px;backdrop-filter:blur(4px);animation:kffade 3s forwards;white-space:nowrap';
  el.textContent = msg;
  kf.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showBanner(text, sub) {
  const b = document.getElementById('h-banner');
  const s = document.getElementById('h-sub');
  if(b){b.textContent=text;b.style.opacity='1';}
  if(s){s.textContent=sub||'';s.style.opacity='1';}
  setTimeout(()=>{if(b)b.style.opacity='0';if(s)s.style.opacity='0';},3000);
}

function showMenu() {
  let m = document.getElementById('main-menu');
  if (!m) {
    m = document.createElement('div');
    m.id = 'main-menu';
    m.style.cssText = 'position:fixed;inset:0;background:linear-gradient(135deg,#0d1117,#161b22);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;font-family:system-ui';
    m.innerHTML = `
      <h1 style="font-size:clamp(24px,6vw,40px);color:#e6edf3;letter-spacing:4px;text-transform:uppercase">Iron Squad</h1>
      <div style="color:#8b949e;font-size:12px;margin:4px 0 24px">Tactical Operations</div>
      <button onclick="startGame('defusal')" style="padding:14px 36px;font-size:16px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:5px;min-width:220px;text-transform:uppercase;letter-spacing:2px;background:linear-gradient(135deg,#238636,#2ea043);color:#fff">💣 ДЕФУЗ</button>
      <button onclick="startGame('dm')" style="padding:14px 36px;font-size:16px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:5px;min-width:220px;text-transform:uppercase;letter-spacing:2px;background:#30363d;color:#e6edf3;border:1px solid #484f58">💀 ДЕСТМАТЧ</button>
    `;
    document.body.appendChild(m);
  }
  m.style.display = 'flex';
}

window.startGame = function(mode) {
  G.mode = mode;
  G.round = 0; G.ctScore = 0; G.tScore = 0;
  G.kills = 0; G.deaths = 0; G.money = 800;
  G.weapon = 'usp'; G.ammo = 12; G.reserve = 24;
  G.hp = 100; G.armor = 0;
  document.getElementById('main-menu').style.display = 'none';
  updateWeaponModel();
  G.buyTime = true;
  showBanner('Магазин', 'B для покупки оружия');
  openBuy();
  setTimeout(() => { closeBuy(); G.buyTime = false; startRound(); }, CFG.BUY_TIME * 1000);
};

window.restartGame = function() {
  document.getElementById('game-over')?.remove();
  startGame(G.mode);
};

window.backToMenu = function() {
  G.roundActive = false;
  document.getElementById('game-over')?.remove();
  document.getElementById('game-hud')?.remove();
  showMenu();
};

function gameOver() {
  const winner = G.ctScore > G.tScore ? 'CT' : 'T';
  let go = document.getElementById('game-over');
  if (!go) {
    go = document.createElement('div');
    go.id = 'game-over';
    go.style.cssText = 'position:fixed;inset:0;background:#0d1117ee;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8000;font-family:system-ui';
    document.body.appendChild(go);
  }
  go.innerHTML = `
    <h2 style="color:${winner==='CT'?'#58a6ff':'#e3b341'};font-size:clamp(22px,6vw,38px);text-transform:uppercase;margin-bottom:12px">ПОБЕДА ${winner}</h2>
    <div style="color:#8b949e;font-size:14px;margin-bottom:24px;text-align:center;line-height:1.8">
      Счёт: CT ${G.ctScore} — ${G.tScore} T<br>
      Убийств: ${G.kills} | Смертей: ${G.deaths}<br>
      Деньги: $${G.money}
    </div>
    <button onclick="restartGame()" style="padding:12px 36px;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:5px;background:#238636;color:#fff">ЗАНОВО</button>
    <button onclick="backToMenu()" style="padding:12px 36px;font-size:14px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:5px;background:#30363d;color:#e6edf3;border:1px solid #484f58">МЕНЮ</button>
  `;
  go.style.display = 'flex';
}

// ========== GAME LOOP ==========
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(G.clock.getDelta(), 0.05);

  if (!G.roundActive || G.hp <= 0) {
    G.renderer.render(G.scene, G.camera);
    return;
  }

  // Player movement
  let mx = 0, mz = 0;
  if (G.keys['w']||G.keys['ц']) mz = -1;
  if (G.keys['s']||G.keys['ы']) mz = 1;
  if (G.keys['a']||G.keys['ф']) mx = -1;
  if (G.keys['d']||G.keys['в']) mx = 1;
  if (G.joyActive) { mx = G.moveX; mz = G.moveZ; }

  const cos = Math.cos(G.camYaw), sin = Math.sin(G.camYaw);
  const rmx = mx*cos - mz*sin, rmz = mx*sin + mz*cos;
  const len = Math.sqrt(rmx*rmx+rmz*rmz);
  if (len > 0.1) {
    const spd = CFG.PLAYER_SPEED * dt;
    const nx = G.playerPos.x + (rmx/len)*spd;
    const nz = G.playerPos.z + (rmz/len)*spd;
    let blocked = false;
    for (const o of G.obstacles) {
      if (nx+CFG.PLAYER_RADIUS>o.x && nx-CFG.PLAYER_RADIUS<o.x+o.w &&
          nz+CFG.PLAYER_RADIUS>o.z && nz-CFG.PLAYER_RADIUS<o.z+o.d) { blocked=true; break; }
    }
    const hs = CFG.MAP_SIZE/2 - 1;
    if (!blocked && Math.abs(nx)<hs && Math.abs(nz)<hs) {
      G.playerPos.x = nx; G.playerPos.z = nz;
    }
  }

  // Recoil recovery
  G.recoilX *= 0.9; G.recoilY *= 0.92;
  if (G.recoilIdx > 0 && performance.now() - G.lastShot > 200) G.recoilIdx = Math.max(0, G.recoilIdx-1);

  // Camera
  G.camera.position.set(G.playerPos.x, CFG.PLAYER_HEIGHT, G.playerPos.z);
  G.camera.rotation.set(G.camPitch - G.recoilY*0.01, G.camYaw + G.recoilX*0.005, 0, 'YXZ');

  // Auto-fire
  if (G.shooting && WEAPONS[G.weapon].auto) playerShoot();

  // Reload
  if (G.reloading && performance.now() - G.reloadStart > WEAPONS[G.weapon].reload) {
    const w = WEAPONS[G.weapon];
    const needed = w.mag - G.ammo;
    const loaded = Math.min(needed, G.reserve);
    G.ammo += loaded; G.reserve -= loaded;
    G.reloading = false;
  }

  // Bullets
  for (let i = G.bullets.length-1; i >= 0; i--) {
    const b = G.bullets[i];
    b.mesh.position.add(b.velocity.clone().multiplyScalar(dt));
    b.life -= dt;
    if (b.life <= 0 || Math.abs(b.mesh.position.x) > 50 || Math.abs(b.mesh.position.z) > 50) {
      G.scene.remove(b.mesh); G.bullets.splice(i,1); continue;
    }
    if (b.mesh.position.y < 0.1) { G.scene.remove(b.mesh); G.bullets.splice(i,1); continue; }
    let hit = false;
    for (const o of G.obstacles) {
      if (b.mesh.position.x>o.x && b.mesh.position.x<o.x+o.w &&
          b.mesh.position.z>o.z && b.mesh.position.z<o.z+o.d) {
        G.scene.remove(b.mesh); G.bullets.splice(i,1); hit=true; break;
      }
    }
    if (hit) continue;
    if (b.owner === 'player') {
      for (const bot of G.bots) {
        if (!bot.alive) continue;
        if (b.mesh.position.distanceTo(bot.mesh.position) < 0.8) {
          damageBot(bot, b.damage);
          G.sound.play('hit');
          G.scene.remove(b.mesh); G.bullets.splice(i,1); break;
        }
      }
    }
    if (b.owner === 'enemy') {
      if (b.mesh.position.distanceTo(G.playerPos) < 0.8) {
        dealDamage(b.damage);
        G.scene.remove(b.mesh); G.bullets.splice(i,1);
      }
    }
  }

  // Bots
  updateBots(dt);

  // Particles
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i];
    p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
    p.velocity.y -= 15*dt; p.life -= dt;
    p.mesh.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) { G.scene.remove(p.mesh); G.particles.splice(i,1); }
  }

  // Round timer
  G.roundTimer -= dt;
  if (G.roundTimer <= 0) endRound(G.team==='ct'?'t':'ct');

  // Wave check
  if (!G.buyTime && G.bots.filter(b=>b.alive && b.team!==G.team).length === 0) {
    endRound(G.team);
  }

  updateHUD();
  G.renderer.render(G.scene, G.camera);
}

style.textContent = `@keyframes kffade{0%,75%{opacity:1}100%{opacity:0}}`;
