<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Iron Squad 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:#e6edf3;font-family:'Segoe UI',Arial,sans-serif}
#loading h1{font-size:clamp(24px,7vw,48px);letter-spacing:6px;margin-bottom:20px;text-transform:uppercase}
#loading .bar{width:clamp(200px,60vw,400px);height:4px;background:#21262d;border-radius:2px;overflow:hidden}
#loading .fill{height:100%;background:linear-gradient(90deg,#238636,#58a6ff);width:0%;transition:width .3s}
#loading .status{color:#8b949e;margin-top:12px;font-size:14px}
#menu{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#0d1117,#161b22);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:900;font-family:'Segoe UI',Arial,sans-serif}
#menu h1{font-size:clamp(28px,8vw,56px);color:#e6edf3;letter-spacing:4px;margin-bottom:8px;text-transform:uppercase}
#menu .sub{color:#8b949e;font-size:clamp(11px,2.5vw,16px);margin-bottom:36px}
#menu .btn{padding:14px 40px;font-size:clamp(14px,3.5vw,18px);font-weight:700;border:none;border-radius:10px;cursor:pointer;margin:6px;min-width:200px;text-transform:uppercase;letter-spacing:2px}
#btn-start{background:linear-gradient(135deg,#238636,#2ea043);color:#fff}
#btn-surv{background:#30363d;color:#e6edf3;border:1px solid #484f58}
#hud{position:fixed;top:0;left:0;width:100%;padding:12px 16px;display:none;z-index:100;font-family:'Segoe UI',Arial,sans-serif;pointer-events:none}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start}
.hp-wrap{display:flex;flex-direction:column;gap:3px}
.bar{width:clamp(100px,22vw,160px);height:10px;background:#21262d;border-radius:5px;overflow:hidden;border:1px solid #30363d}
.bar-in{height:100%;border-radius:5px;transition:width .3s}
.hp-bar{background:linear-gradient(90deg,#da3633,#f85149)}
.armor-bar{background:linear-gradient(90deg,#d29922,#e3b341)}
.bar-lbl{font-size:9px;color:#8b949e}
.hud-right{text-align:right}
.score{color:#e6edf3;font-size:clamp(14px,3.5vw,20px);font-weight:700}
.wave{color:#58a6ff;font-size:clamp(11px,2.8vw,14px);margin-top:2px}
.ammo{color:#e6edf3;font-size:clamp(11px,2.8vw,14px);margin-top:4px;font-variant-numeric:tabular-nums}
.hud-weapons{position:fixed;bottom:12px;right:12px;display:flex;gap:6px;z-index:100;pointer-events:auto}
.wslot{width:44px;height:44px;background:#161b22aa;border:2px solid #30363d;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#e6edf3;backdrop-filter:blur(4px)}
.wslot.active{border-color:#58a6ff;box-shadow:0 0 10px #58a6ff44}
#crosshair{position:fixed;top:50%;left:50%;width:20px;height:20px;pointer-events:none;z-index:110;transform:translate(-50%,-50%);display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#f85149cc}
#crosshair::before{width:2px;height:20px;left:9px;top:0}
#crosshair::after{width:20px;height:2px;top:9px;left:0}
#joystick-zone{position:fixed;bottom:0;left:0;width:45%;height:40%;z-index:200}
.joy-base{position:absolute;width:110px;height:110px;border-radius:50%;background:#ffffff0a;border:2px solid #ffffff15;pointer-events:none;transform:translate(-50%,-50%);display:none}
.joy-knob{position:absolute;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle,#ffffff2a,#ffffff0a);border:2px solid #ffffff33;pointer-events:none;transform:translate(-50%,-50%);display:none}
#shoot-zone{position:fixed;top:0;right:0;width:55%;height:100%;z-index:200}
#damage-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:#f8514900;pointer-events:none;z-index:90;transition:background .15s}
#wave-banner{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);color:#58a6ff;font-size:clamp(18px,5vw,32px);font-weight:700;text-transform:uppercase;letter-spacing:4px;opacity:0;transition:opacity .5s;text-shadow:0 0 30px #58a6ff44;z-index:120;pointer-events:none;font-family:'Segoe UI',Arial,sans-serif}
#gameover{position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1117ee;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;font-family:'Segoe UI',Arial,sans-serif}
#gameover h2{color:#f85149;font-size:clamp(22px,6vw,40px);text-transform:uppercase;margin-bottom:12px}
#gameover .fs{color:#e6edf3;font-size:clamp(16px,4.5vw,26px);margin-bottom:6px}
#gameover .fw{color:#58a6ff;font-size:clamp(13px,3.5vw,18px);margin-bottom:28px}
#gameover .btn{padding:12px 36px;font-size:clamp(13px,3vw,16px);font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:5px;text-transform:uppercase;letter-spacing:1px}
#killfeed{position:fixed;top:56px;right:12px;display:flex;flex-direction:column;gap:3px;z-index:110;pointer-events:none;font-family:'Segoe UI',Arial,sans-serif}
.kmsg{color:#8b949e;font-size:clamp(10px,2.4vw,12px);background:#161b22aa;padding:3px 8px;border-radius:5px;backdrop-filter:blur(4px);animation:kfade 3s forwards;white-space:nowrap}
@keyframes kfade{0%,70%{opacity:1}100%{opacity:0;transform:translateY(-16px)}}
#minimap{position:fixed;bottom:12px;left:12px;width:clamp(80px,18vw,120px);height:clamp(80px,18vw,120px);border:2px solid #30363d;border-radius:8px;background:#0d1117cc;z-index:100;pointer-events:none;overflow:hidden}
#minimap canvas{width:100%;height:100%}
</style>
</head>
<body>
<div id="loading">
  <h1>Iron Squad 3D</h1>
  <div class="bar"><div class="fill" id="load-bar"></div></div>
  <div class="status" id="load-status">Инициализация...</div>
</div>

<div id="menu">
  <h1>Iron Squad 3D</h1>
  <div class="sub">Тактический шутер от третьего лица</div>
  <button id="btn-start" class="btn" onclick="startGame('waves')">⚔️ ВОЛНЫ PvE</button>
  <button id="btn-surv" class="btn" onclick="startGame('survival')">💀 ВЫЖИВАНИЕ</button>
</div>

<div id="hud">
  <div class="hud-top">
    <div class="hp-wrap">
      <div class="bar-lbl">HP</div>
      <div class="bar"><div class="bar-in hp-bar" id="hp-bar" style="width:100%"></div></div>
      <div class="bar-lbl">Броня</div>
      <div class="bar"><div class="bar-in armor-bar" id="armor-bar" style="width:0%"></div></div>
    </div>
    <div class="hud-right">
      <div class="score" id="score-display">0</div>
      <div class="wave" id="wave-display">Волна 1</div>
      <div class="ammo" id="ammo-display">30 / 30</div>
    </div>
  </div>
</div>
<div class="hud-weapons" id="weapon-slots"></div>
<div id="joystick-zone"><div class="joy-base" id="joy-base"></div><div class="joy-knob" id="joy-knob"></div></div>
<div id="shoot-zone"></div>
<div id="crosshair"></div>
<div id="damage-flash"></div>
<div id="wave-banner"></div>
<div id="killfeed"></div>
<div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
<div id="gameover">
  <h2>УНИЧТОЖЕН</h2>
  <div class="fs" id="final-score">Очки: 0</div>
  <div class="fw" id="final-wave">Волна 1 | Убийств: 0</div>
  <button class="btn" style="background:#238636;color:#fff" onclick="restartGame()">ЗАНОВО</button>
  <button class="btn" style="background:#30363d;color:#e6edf3;border:1px solid #484f58" onclick="backToMenu()">МЕНЮ</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';

// ========== CONFIG ==========
const MAP_SIZE = 100;
const PLAYER_SPEED = 8;
const BULLET_SPEED = 40;
const ENEMY_SPEED = 3;
const GRAVITY = -20;

// ========== WEAPONS ==========
const WEAPONS = {
  pistol:  {name:'Пистолет',emoji:'🔫',damage:20,fireRate:250,mag:12,reload:1200,speed:BULLET_SPEED,color:0xe3b341},
  rifle:   {name:'Автомат',emoji:'🔫',damage:14,fireRate:90,mag:30,reload:1800,speed:BULLET_SPEED*1.1,color:0x58a6ff},
  shotgun: {name:'Дробовик',emoji:'💥',damage:10,fireRate:550,mag:6,reload:2000,speed:BULLET_SPEED*0.8,color:0xf0883e,pellets:8,spread:0.18},
  sniper:  {name:'Снайпер',emoji:'🎯',damage:65,fireRate:800,mag:5,reload:2500,speed:BULLET_SPEED*1.4,color:0xda3633},
  smg:     {name:'ПП',emoji:'🔫',damage:10,fireRate:65,mag:40,reload:1500,speed:BULLET_SPEED*0.9,color:0xa371f7},
  rpg:     {name:'РПГ',emoji:'🚀',damage:120,fireRate:2200,mag:2,reload:3000,speed:BULLET_SPEED*0.6,color:0xf85149,explosive:true}
};

// ========== STATE ==========
let scene, camera, renderer, clock;
let player, playerMixer, playerActions = [];
let ground, skybox;
let enemies = [], bullets = [], particles = [], pickups = [], obstacles = [], buildings = [];
let score = 0, wave = 0, waveActive = false, gameRunning = false, paused = false;
let currentWeapon = 'rifle', ammo = {}, reloading = false, lastShot = 0, reloadStart = 0;
let hp = 100, maxHp = 100, armor = 0, maxArmor = 50;
let kills = 0;
let moveX = 0, moveY = 0;
let joyActive = false, joyTouchId = null, joyBaseX = 0, joyBaseY = 0;
let aimActive = false, aimTouchId = null;
let mouseX = 0, mouseY = 0, mouseDown = false;
let cameraAngle = 0, cameraPitch = 0.5, cameraDist = 12;
let joystickMode = 'move'; // move or aim
let lastMoveAngle = 0;

// ========== DOM ==========
const loadBar = document.getElementById('load-bar');
const loadStatus = document.getElementById('load-status');
const crosshair = document.getElementById('crosshair');

function setLoad(pct, msg) {
  loadBar.style.width = pct + '%';
  loadStatus.textContent = msg;
}

// ========== INIT ==========
async function init() {
  setLoad(10, 'Создаю сцену...');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 60, 120);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
  renderer = new THREE.WebGLRenderer({antialias: true, powerPreference: 'high-performance'});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  setLoad(20, 'Освещение...');
  setupLighting();

  setLoad(30, 'Карта...');
  createMap();

  setLoad(50, 'Окружение...');
  createEnvironment();

  setLoad(70, 'Персонаж...');
  createPlayer();

  setLoad(85, 'Интерфейс...');
  setupInput();

  setLoad(100, 'Готово!');
  await new Promise(r => setTimeout(r, 500));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

// ========== LIGHTING ==========
function setupLighting() {
  const ambient = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambient);

  const hemi = new THREE.HemisphereLight(0x87ceeb, 0x362a28, 0.5);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(30, 40, 20);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 100;
  sun.shadow.camera.left = -50;
  sun.shadow.camera.right = 50;
  sun.shadow.camera.top = 50;
  sun.shadow.camera.bottom = -50;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x4466aa, 0.3);
  fill.position.set(-20, 10, -10);
  scene.add(fill);
}

// ========== MAP ==========
function createMap() {
  // Ground
  const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 64, 64);
  const groundMat = new THREE.MeshStandardMaterial({color: 0x2d5a27, roughness: 0.9, metalness: 0.1});
  ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Ground detail - dirt patches
  for (let i = 0; i < 30; i++) {
    const s = 2 + Math.random() * 4;
    const patch = new THREE.Mesh(
      new THREE.PlaneGeometry(s, s),
      new THREE.MeshStandardMaterial({color: 0x4a3728, roughness: 1})
    );
    patch.rotation.x = -Math.PI / 2;
    patch.position.set((Math.random()-0.5)*MAP_SIZE*0.8, 0.01, (Math.random()-0.5)*MAP_SIZE*0.8);
    scene.add(patch);
  }

  // Map boundaries - concrete walls
  const wallMat = new THREE.MeshStandardMaterial({color: 0x555555, roughness: 0.7});
  const wallH = 4, wallT = 1;
  const walls = [
    {pos:[0,wallH/2,-MAP_SIZE/2], scale:[MAP_SIZE,wallH,wallT]},
    {pos:[0,wallH/2,MAP_SIZE/2], scale:[MAP_SIZE,wallH,wallT]},
    {pos:[-MAP_SIZE/2,wallH/2,0], scale:[wallT,wallH,MAP_SIZE]},
    {pos:[MAP_SIZE/2,wallH/2,0], scale:[wallT,wallH,MAP_SIZE]}
  ];
  walls.forEach(w => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...w.scale), wallMat);
    m.position.set(...w.pos);
    m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
  });
}

// ========== ENVIRONMENT ==========
function createEnvironment() {
  // Buildings
  const buildingConfigs = [
    {x:-20,z:-20,w:8,h:10,d:8,color:0x555566},
    {x:20,z:-25,w:6,h:8,d:10,color:0x666677},
    {x:-25,z:20,w:10,h:12,d:6,color:0x4a4a5a},
    {x:25,z:15,w:7,h:9,d:7,color:0x5a5a6a},
    {x:0,z:-30,w:5,h:6,d:5,color:0x6a6a7a},
    {x:-35,z:0,w:4,h:7,d:12,color:0x555566},
    {x:35,z:-10,w:8,h:8,d:5,color:0x666677},
    {x:10,z:30,w:6,h:10,d:8,color:0x4a4a5a},
    {x:-10,z:35,w:9,h:7,d:6,color:0x5a5a6a},
    {x:0,z:0,w:4,h:3,d:4,color:0x7a7a8a}
  ];

  buildingConfigs.forEach(b => {
    const group = new THREE.Group();
    // Main body
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(b.w, b.h, b.d),
      new THREE.MeshStandardMaterial({color: b.color, roughness: 0.8})
    );
    body.position.y = b.h / 2;
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);

    // Roof
    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(b.w + 0.5, 0.3, b.d + 0.5),
      new THREE.MeshStandardMaterial({color: 0x333344, roughness: 0.6})
    );
    roof.position.y = b.h;
    group.add(roof);

    // Windows
    const winMat = new THREE.MeshStandardMaterial({color: 0x88aacc, emissive: 0x223344, emissiveIntensity: 0.3, roughness: 0.2});
    for (let wy = 2; wy < b.h - 1; wy += 3) {
      for (let wx = -b.w/2 + 1.5; wx < b.w/2 - 1; wx += 2.5) {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.5), winMat);
        win.position.set(wx, wy, b.d/2 + 0.01);
        group.add(win);
        const win2 = win.clone();
        win2.position.z = -b.d/2 - 0.01;
        win2.rotation.y = Math.PI;
        group.add(win2);
      }
    }

    group.position.set(b.x, 0, b.z);
    scene.add(group);
    buildings.push(group);

    // Add obstacle collision
    obstacles.push({x: b.x - b.w/2, z: b.z - b.d/2, w: b.w, d: b.d});
  });

  // Crates / cover objects
  const crateMat = new THREE.MeshStandardMaterial({color: 0x8B7355, roughness: 0.9});
  for (let i = 0; i < 20; i++) {
    const s = 1 + Math.random() * 1.5;
    const crate = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), crateMat);
    crate.position.set(
      (Math.random()-0.5)*MAP_SIZE*0.7,
      s/2,
      (Math.random()-0.5)*MAP_SIZE*0.7
    );
    crate.castShadow = true;
    crate.receiveShadow = true;
    crate.rotation.y = Math.random() * Math.PI;
    scene.add(crate);
    obstacles.push({x: crate.position.x - s/2, z: crate.position.z - s/2, w: s, d: s});
  }

  // Barrels
  const barrelMat = new THREE.MeshStandardMaterial({color: 0x445544, roughness: 0.7, metalness: 0.3});
  for (let i = 0; i < 10; i++) {
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.5, 12), barrelMat);
    barrel.position.set(
      (Math.random()-0.5)*MAP_SIZE*0.6,
      0.75,
      (Math.random()-0.5)*MAP_SIZE*0.6
    );
    barrel.castShadow = true;
    scene.add(barrel);
    obstacles.push({x: barrel.position.x - 0.5, z: barrel.position.z - 0.5, w: 1, d: 1});
  }

  // Trees
  const trunkMat = new THREE.MeshStandardMaterial({color: 0x5c4033, roughness: 0.9});
  const leafMat = new THREE.MeshStandardMaterial({color: 0x2d5a27, roughness: 0.8});
  for (let i = 0; i < 25; i++) {
    const tx = (Math.random()-0.5)*MAP_SIZE*0.85;
    const tz = (Math.random()-0.5)*MAP_SIZE*0.85;
    // Check not too close to buildings
    let tooClose = false;
    for (const b of obstacles) {
      if (tx > b.x-3 && tx < b.x+b.w+3 && tz > b.z-3 && tz < b.z+b.d+3) {tooClose=true;break;}
    }
    if (tooClose) continue;

    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3, 6), trunkMat);
    trunk.position.set(tx, 1.5, tz);
    trunk.castShadow = true;
    scene.add(trunk);

    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 6), leafMat);
    leaves.position.set(tx, 4, tz);
    leaves.castShadow = true;
    scene.add(leaves);
  }

  // Street lights
  const lightMat = new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.5});
  const lampMat = new THREE.MeshStandardMaterial({color: 0xffdd88, emissive: 0xffaa44, emissiveIntensity: 0.8});
  for (let i = 0; i < 8; i++) {
    const lx = (Math.random()-0.5)*MAP_SIZE*0.7;
    const lz = (Math.random()-0.5)*MAP_SIZE*0.7;
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 5, 6), lightMat);
    pole.position.set(lx, 2.5, lz);
    scene.add(pole);
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), lampMat);
    lamp.position.set(lx, 5.2, lz);
    scene.add(lamp);
    const pLight = new THREE.PointLight(0xffaa44, 0.5, 15);
    pLight.position.set(lx, 5, lz);
    scene.add(pLight);
  }
}

// ========== PLAYER ==========
function createPlayer() {
  const group = new THREE.Group();

  // Body
  const bodyMat = new THREE.MeshStandardMaterial({color: 0x2244aa, roughness: 0.6, metalness: 0.2});
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 1.2, 8), bodyMat);
  body.position.y = 0.9;
  body.castShadow = true;
  group.add(body);

  // Head
  const headMat = new THREE.MeshStandardMaterial({color: 0xddbb88, roughness: 0.7});
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), headMat);
  head.position.y = 1.8;
  head.castShadow = true;
  group.add(head);

  // Helmet
  const helmetMat = new THREE.MeshStandardMaterial({color: 0x334455, roughness: 0.4, metalness: 0.5});
  const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), helmetMat);
  helmet.position.y = 1.85;
  helmet.scale.y = 0.7;
  group.add(helmet);

  // Gun
  const gunMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.3, metalness: 0.8});
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.8), gunMat);
  gun.position.set(0.35, 1.1, 0.4);
  gun.name = 'gun';
  group.add(gun);

  // Arms
  const armMat = new THREE.MeshStandardMaterial({color: 0x2244aa, roughness: 0.6});
  const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.7, 6), armMat);
  armL.position.set(-0.45, 1.1, 0);
  armL.rotation.z = 0.3;
  group.add(armL);
  const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.7, 6), armMat);
  armR.position.set(0.45, 1.1, 0);
  armR.rotation.z = -0.3;
  group.add(armR);

  // Legs
  const legMat = new THREE.MeshStandardMaterial({color: 0x333344, roughness: 0.8});
  const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.7, 6), legMat);
  legL.position.set(-0.18, 0.35, 0);
  group.add(legL);
  const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.7, 6), legMat);
  legR.position.set(0.18, 0.35, 0);
  group.add(legR);

  // Shadow
  const shadowGeo = new THREE.PlaneGeometry(1.5, 1.5);
  const shadowMat = new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.3});
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.02;
  group.add(shadow);

  player = group;
  player.position.set(0, 0, 0);
  scene.add(player);
}

// ========== ENEMIES ==========
function createEnemy(x, z, type) {
  const configs = {
    grunt:   {hp:50, speed:2.5, damage:10, radius:0.5, color:0xcc3333, score:10, fireRate:1200},
    runner:  {hp:30, speed:4, damage:6, radius:0.4, color:0xdd6622, score:15, fireRate:800},
    tank:    {hp:150, speed:1.5, damage:18, radius:0.7, color:0x7733aa, score:30, fireRate:2000},
    sniper_e:{hp:35, speed:2, damage:25, radius:0.45, color:0xddaa22, score:25, fireRate:1500},
    boss:    {hp:500, speed:1.2, damage:30, radius:1, color:0xff2244, score:100, fireRate:800}
  };
  const c = configs[type] || configs.grunt;

  const group = new THREE.Group();

  // Body
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(c.radius*0.8, c.radius, 1.2, 8),
    new THREE.MeshStandardMaterial({color: c.color, roughness: 0.6})
  );
  body.position.y = 0.9;
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(c.radius*0.5, 8, 8),
    new THREE.MeshStandardMaterial({color: 0xddbb88, roughness: 0.7})
  );
  head.position.y = 1.7;
  group.add(head);

  // Gun
  const gun = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 0.08, 0.6),
    new THREE.MeshStandardMaterial({color: 0x222222, metalness: 0.8})
  );
  gun.position.set(0.3, 1, 0.3);
  group.add(gun);

  // HP bar
  const hpBarBg = new THREE.Mesh(
    new THREE.PlaneGeometry(1.2, 0.12),
    new THREE.MeshBasicMaterial({color: 0x222222})
  );
  hpBarBg.position.y = 2.3;
  hpBarBg.lookAt(camera.position);
  group.add(hpBarBg);

  const hpBarIn = new THREE.Mesh(
    new THREE.PlaneGeometry(1.18, 0.1),
    new THREE.MeshBasicMaterial({color: 0xff3333})
  );
  hpBarIn.position.y = 2.3;
  hpBarIn.position.z = 0.01;
  group.add(hpBarIn);

  group.position.set(x, 0, z);
  scene.add(group);

  const enemy = {
    mesh: group,
    hpBar: hpBarIn,
    hp: c.hp, maxHp: c.hp,
    speed: c.speed,
    damage: c.damage,
    type: type,
    score: c.score,
    fireRate: c.fireRate,
    lastShot: 0,
    state: 'chase',
    radius: c.radius
  };
  enemies.push(enemy);
  return enemy;
}

// ========== BULLETS ==========
function fireBullet(origin, direction, weapon, owner) {
  const w = WEAPONS[weapon] || WEAPONS.pistol;
  const pellets = w.pellets || 1;
  for (let i = 0; i < pellets; i++) {
    const dir = direction.clone();
    if (w.spread) {
      dir.x += (Math.random()-0.5)*w.spread;
      dir.z += (Math.random()-0.5)*w.spread;
      dir.normalize();
    }

    const geo = new THREE.SphereGeometry(w.explosive ? 0.12 : 0.06, 6, 6);
    const mat = new THREE.MeshBasicMaterial({color: w.color});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(origin);
    scene.add(mesh);

    // Tracer
    const tracerGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 4);
    const tracerMat = new THREE.MeshBasicMaterial({color: w.color, transparent: true, opacity: 0.6});
    const tracer = new THREE.Mesh(tracerGeo, tracerMat);
    tracer.rotation.x = Math.PI / 2;
    mesh.add(tracer);

    bullets.push({
      mesh,
      velocity: dir.multiplyScalar(w.speed),
      damage: w.damage,
      owner,
      life: 2,
      explosive: w.explosive
    });
  }
}

// ========== EXPLOSIONS ==========
function explode(pos, damage) {
  // Visual
  const flash = new THREE.PointLight(0xff6600, 5, 15);
  flash.position.copy(pos);
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 200);

  // Particles
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
      color: Math.random() > 0.5 ? 0xff6600 : 0xffaa00,
      transparent: true
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    scene.add(p);
    const vel = new THREE.Vector3(
      (Math.random()-0.5)*8,
      Math.random()*6,
      (Math.random()-0.5)*8
    );
    particles.push({mesh:p, velocity:vel, life:0.8, maxLife:0.8});
  }

  // Damage enemies
  enemies.forEach(e => {
    const d = e.mesh.position.distanceTo(pos);
    if (d < 5) {
      const dmg = damage * (1 - d/5);
      damageEnemy(e, dmg);
    }
  });
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  // Flash red
  e.mesh.children[0].material.emissive = new THREE.Color(0xff0000);
  e.mesh.children[0].material.emissiveIntensity = 0.5;
  setTimeout(() => {
    if (e.mesh.children[0]) {
      e.mesh.children[0].material.emissiveIntensity = 0;
    }
  }, 100);

  // HP bar
  e.hpBar.scale.x = Math.max(0, e.hp / e.maxHp);
  e.hpBar.position.x = -(1 - e.hp/e.maxHp) * 0.59;

  if (e.hp <= 0) {
    killEnemy(e);
  }
}

function killEnemy(e) {
  score += e.score;
  kills++;

  // Death particles
  for (let i = 0; i < 12; i++) {
    const geo = new THREE.SphereGeometry(0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({color: 0xff3333, transparent: true});
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(e.mesh.position);
    p.position.y += 1;
    scene.add(p);
    const vel = new THREE.Vector3(
      (Math.random()-0.5)*5,
      Math.random()*4+2,
      (Math.random()-0.5)*5
    );
    particles.push({mesh:p, velocity:vel, life:1, maxLife:1});
  }

  scene.remove(e.mesh);
  enemies.splice(enemies.indexOf(e), 1);

  // Kill feed
  const names = {grunt:'Солдат',runner:'Разведчик',tank:'Танк',sniper_e:'Снайпер',boss:'БОСС'};
  addKillFeed(names[e.type] || e.type);

  // Random pickup
  if (Math.random() < 0.2) {
    spawnPickup(e.mesh.position.clone());
  }

  updateHUD();
}

// ========== PICKUPS ==========
function spawnPickup(pos) {
  const types = ['health','ammo','weapon'];
  const type = types[Math.floor(Math.random()*types.length)];
  const colors = {health:0x22cc44, ammo:0xddaa22, weapon:0xaa44dd};
  const geo = new THREE.OctahedronGeometry(0.3);
  const mat = new THREE.MeshStandardMaterial({color: colors[type], emissive: colors[type], emissiveIntensity: 0.5});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, 0.8, pos.z);
  scene.add(mesh);

  let weapon = null;
  if (type === 'weapon') {
    const guns = ['shotgun','sniper','smg','rpg'];
    weapon = guns[Math.floor(Math.random()*guns.length)];
  }

  pickups.push({mesh, type, weapon, life: 15});
}

// ========== WAVE SYSTEM ==========
function startWave() {
  wave++;
  waveActive = true;
  const count = 4 + wave * 3;
  showBanner(`ВОЛНА ${wave}`);

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (!gameRunning) return;
      const angle = Math.random() * Math.PI * 2;
      const dist = 35 + Math.random() * 15;
      const ex = player.position.x + Math.cos(angle) * dist;
      const ez = player.position.z + Math.sin(angle) * dist;
      // Clamp to map
      const cx = Math.max(-MAP_SIZE/2+3, Math.min(MAP_SIZE/2-3, ex));
      const cz = Math.max(-MAP_SIZE/2+3, Math.min(MAP_SIZE/2-3, ez));

      let type = 'grunt';
      if (wave >= 3 && Math.random() < 0.25) type = 'runner';
      if (wave >= 5 && Math.random() < 0.15) type = 'sniper_e';
      if (wave >= 7 && Math.random() < 0.12) type = 'tank';
      if (wave % 5 === 0 && i === 0) type = 'boss';

      createEnemy(cx, cz, type);
    }, i * 500);
  }
}

function showBanner(text) {
  const el = document.getElementById('wave-banner');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2500);
}

// ========== INPUT ==========
function setupInput() {
  // Joystick
  const jZone = document.getElementById('joystick-zone');
  const jBase = document.getElementById('joy-base');
  const jKnob = document.getElementById('joy-knob');
  const shootZone = document.getElementById('shoot-zone');

  jZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joyActive = true;
    joyTouchId = t.identifier;
    joyBaseX = t.clientX;
    joyBaseY = t.clientY;
    jBase.style.display = 'block';
    jKnob.style.display = 'block';
    jBase.style.left = t.clientX+'px';
    jBase.style.top = t.clientY+'px';
    jKnob.style.left = t.clientX+'px';
    jKnob.style.top = t.clientY+'px';
  }, {passive:false});

  jZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        const dx = t.clientX - joyBaseX;
        const dy = t.clientY - joyBaseY;
        const dist = Math.sqrt(dx*dx+dy*dy);
        const maxD = 50;
        const clamped = Math.min(dist, maxD);
        const a = Math.atan2(dy, dx);
        jKnob.style.left = (joyBaseX + Math.cos(a)*clamped)+'px';
        jKnob.style.top = (joyBaseY + Math.sin(a)*clamped)+'px';
        moveX = dx/maxD;
        moveY = dy/maxD;
        const m = Math.sqrt(moveX*moveX+moveY*moveY);
        if (m > 1) {moveX/=m; moveY/=m;}
      }
    }
  }, {passive:false});

  const endJoy = e => {
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        joyActive = false;
        joyTouchId = null;
        moveX = 0; moveY = 0;
        jBase.style.display = 'none';
        jKnob.style.display = 'none';
      }
    }
  };
  jZone.addEventListener('touchend', endJoy);
  jZone.addEventListener('touchcancel', endJoy);

  // Shoot zone - aim with drag
  shootZone.addEventListener('touchstart', e => {
    e.preventDefault();
    if (paused) return;
    const t = e.changedTouches[0];
    aimActive = true;
    aimTouchId = t.identifier;
    mouseX = t.clientX;
    mouseY = t.clientY;
    mouseDown = true;
    crosshair.style.display = 'block';
    crosshair.style.left = t.clientX+'px';
    crosshair.style.top = t.clientY+'px';
  }, {passive:false});

  shootZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === aimTouchId) {
        const dx = t.clientX - mouseX;
        const dy = t.clientY - mouseY;
        cameraAngle -= dx * 0.005;
        cameraPitch = Math.max(0.2, Math.min(1.2, cameraPitch + dy * 0.003));
        mouseX = t.clientX;
        mouseY = t.clientY;
        crosshair.style.left = t.clientX+'px';
        crosshair.style.top = t.clientY+'px';
      }
    }
  }, {passive:false});

  const endAim = e => {
    for (const t of e.changedTouches) {
      if (t.identifier === aimTouchId) {
        aimActive = false;
        aimTouchId = null;
        mouseDown = false;
        crosshair.style.display = 'none';
      }
    }
  };
  shootZone.addEventListener('touchend', endAim);
  shootZone.addEventListener('touchcancel', endAim);

  // Mouse
  renderer.domElement.addEventListener('mousedown', e => {
    mouseDown = true;
    mouseX = e.clientX;
    mouseY = e.clientY;
    crosshair.style.display = 'block';
    crosshair.style.left = e.clientX+'px';
    crosshair.style.top = e.clientY+'px';
  });
  renderer.domElement.addEventListener('mousemove', e => {
    if (mouseDown) {
      cameraAngle -= (e.clientX - mouseX) * 0.003;
      cameraPitch = Math.max(0.2, Math.min(1.2, cameraPitch + (e.clientY - mouseY) * 0.002));
    }
    mouseX = e.clientX;
    mouseY = e.clientY;
    crosshair.style.left = e.clientX+'px';
    crosshair.style.top = e.clientY+'px';
  });
  renderer.domElement.addEventListener('mouseup', () => {
    mouseDown = false;
    crosshair.style.display = 'none';
  });

  // Keys
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'Escape') togglePause();
    if (e.key >= '1' && e.key <= '6' && gameRunning) {
      const wk = Object.keys(WEAPONS);
      const idx = parseInt(e.key) - 1;
      if (idx < wk.length) {
        currentWeapon = wk[idx];
        reloading = false;
        updateWeaponSlots();
        updateAmmo();
      }
    }
    if ((e.key === 'r' || e.key === 'к') && gameRunning) doReload();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  // Scroll wheel for camera zoom
  renderer.domElement.addEventListener('wheel', e => {
    cameraDist = Math.max(5, Math.min(25, cameraDist + e.deltaY * 0.01));
  });

  window._keys = keys;

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ========== GAME LOOP ==========
function gameLoop() {
  if (!gameRunning) return;
  requestAnimationFrame(gameLoop);
  if (paused) return;

  const dt = Math.min(clock.getDelta(), 0.05);
  const keys = window._keys || {};

  // Player movement
  let mx = 0, mz = 0;
  if (keys['w']||keys['ц']) mz = -1;
  if (keys['s']||keys['ы']) mz = 1;
  if (keys['a']||keys['ф']) mx = -1;
  if (keys['d']||keys['в']) mx = 1;
  if (joyActive) { mx = moveX; mz = moveY; }

  // Rotate movement by camera angle
  const cos = Math.cos(cameraAngle);
  const sin = Math.sin(cameraAngle);
  const rmx = mx * cos - mz * sin;
  const rmz = mx * sin + mz * cos;

  const len = Math.sqrt(rmx*rmx + rmz*rmz);
  if (len > 0.1) {
    const speed = PLAYER_SPEED * dt;
    const nx = player.position.x + (rmx/len) * speed;
    const nz = player.position.z + (rmz/len) * speed;

    // Collision
    let blocked = false;
    for (const o of obstacles) {
      if (nx+0.5>o.x && nx-0.5<o.x+o.w && nz+0.5>o.z && nz-0.5<o.z+o.d) {
        blocked = true; break;
      }
    }
    if (!blocked && Math.abs(nx) < MAP_SIZE/2-1 && Math.abs(nz) < MAP_SIZE/2-1) {
      player.position.x = nx;
      player.position.z = nz;
    }

    lastMoveAngle = Math.atan2(rmx, rmz);
    // Rotate player to face movement
    player.rotation.y = lastMoveAngle;
  }

  // Aim direction - player faces where camera looks
  const aimDir = new THREE.Vector3(
    -Math.sin(cameraAngle),
    0,
    -Math.cos(cameraAngle)
  );
  player.rotation.y = Math.atan2(aimDir.x, aimDir.z);

  // Camera
  const camX = player.position.x + Math.sin(cameraAngle) * cameraDist * Math.cos(cameraPitch);
  const camZ = player.position.z + Math.cos(cameraAngle) * cameraDist * Math.cos(cameraPitch);
  const camY = 2 + cameraDist * Math.sin(cameraPitch);
  camera.position.lerp(new THREE.Vector3(camX, camY, camZ), 0.1);
  camera.lookAt(player.position.x, 1.5, player.position.z);

  // Shooting
  if (mouseDown && !reloading) {
    const w = WEAPONS[currentWeapon];
    const now = performance.now();
    if (now - lastShot > w.fireRate) {
      const a = ammo[currentWeapon] ?? w.mag;
      if (a > 0) {
        const gunWorld = new THREE.Vector3(0.35, 1.1, 0.8);
        player.localToWorld(gunWorld);
        const dir = new THREE.Vector3(
          player.position.x - camX,
          0,
          player.position.z - camZ
        ).normalize();
        fireBullet(gunWorld, dir, currentWeapon, 'player');
        lastShot = now;
        ammo[currentWeapon] = a - 1;
        updateAmmo();
        // Muzzle flash
        const mf = new THREE.PointLight(w.color, 2, 5);
        mf.position.copy(gunWorld);
        scene.add(mf);
        setTimeout(() => scene.remove(mf), 50);
      } else {
        doReload();
      }
    }
  }

  // Reload
  if (reloading) {
    const w = WEAPONS[currentWeapon];
    if (performance.now() - reloadStart > w.reload) {
      ammo[currentWeapon] = w.mag;
      reloading = false;
      updateAmmo();
    }
  }

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.add(b.velocity.clone().multiplyScalar(dt));
    b.life -= dt;

    if (b.life <= 0 || Math.abs(b.mesh.position.x) > MAP_SIZE/2 || Math.abs(b.mesh.position.z) > MAP_SIZE/2) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }

    // Ground check
    if (b.mesh.position.y < 0.1) {
      if (b.explosive) explode(b.mesh.position.clone(), b.damage);
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }

    // Hit obstacles
    let hit = false;
    for (const o of obstacles) {
      if (b.mesh.position.x > o.x && b.mesh.position.x < o.x+o.w &&
          b.mesh.position.z > o.z && b.mesh.position.z < o.z+o.d) {
        if (b.explosive) explode(b.mesh.position.clone(), b.damage);
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // Hit enemies
    if (b.owner === 'player') {
      for (const e of enemies) {
        const d = b.mesh.position.distanceTo(e.mesh.position);
        if (d < e.radius + 0.3) {
          damageEnemy(e, b.damage);
          if (b.explosive) explode(b.mesh.position.clone(), b.damage);
          scene.remove(b.mesh);
          bullets.splice(i, 1);
          break;
        }
      }
    }
    // Hit player
    if (b.owner === 'enemy') {
      const d = b.mesh.position.distanceTo(player.position);
      if (d < 0.8) {
        dealDamage(b.damage);
        scene.remove(b.mesh);
        bullets.splice(i, 1);
      }
    }
  }

  // Enemies AI
  const now = performance.now();
  for (const e of enemies) {
    const dx = player.position.x - e.mesh.position.x;
    const dz = player.position.z - e.mesh.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);

    // Face player
    e.mesh.rotation.y = Math.atan2(dx, dz);

    // HP bar faces camera
    e.hpBar.parent.lookAt(camera.position);

    // Movement AI
    const idealDist = e.type === 'sniper_e' ? 20 : (e.type === 'tank' ? 5 : 8);
    let moveAngle = Math.atan2(dx, dz);

    if (dist > idealDist + 2) {
      // Chase
    } else if (dist < idealDist - 2) {
      moveAngle += Math.PI; // Retreat
    } else {
      moveAngle += Math.PI/2 * (Math.sin(now * 0.002 + e.mesh.id) > 0 ? 1 : -1); // Strafe
    }

    const emx = Math.sin(moveAngle) * e.speed * dt;
    const emz = Math.cos(moveAngle) * e.speed * dt;
    const enx = e.mesh.position.x + emx;
    const enz = e.mesh.position.z + emz;

    let eblocked = false;
    for (const o of obstacles) {
      if (enx+e.radius>o.x && enx-e.radius<o.x+o.w && enz+e.radius>o.z && enz-e.radius<o.z+o.d) {
        eblocked = true; break;
      }
    }
    if (!eblocked && Math.abs(enx) < MAP_SIZE/2-2 && Math.abs(enz) < MAP_SIZE/2-2) {
      e.mesh.position.x = enx;
      e.mesh.position.z = enz;
    }

    // Shoot at player
    if (dist < 30 && now - e.lastShot > e.fireRate) {
      const origin = e.mesh.position.clone();
      origin.y += 1;
      const dir = new THREE.Vector3(dx, 0, dz).normalize();
      // Add some inaccuracy
      dir.x += (Math.random()-0.5)*0.15;
      dir.z += (Math.random()-0.5)*0.15;
      dir.normalize();
      fireBullet(origin, dir, 'pistol', 'enemy');
      e.lastShot = now;
    }
  }

  // Pickups
  for (let i = pickups.length-1; i >= 0; i--) {
    const pk = pickups[i];
    pk.life -= dt;
    pk.mesh.rotation.y += dt * 2;
    pk.mesh.position.y = 0.8 + Math.sin(performance.now()*0.003)*0.15;

    if (pk.life <= 0) {
      scene.remove(pk.mesh);
      pickups.splice(i, 1);
      continue;
    }

    const d = pk.mesh.position.distanceTo(player.position);
    if (d < 1.5) {
      if (pk.type === 'health') hp = Math.min(maxHp, hp + 30);
      else if (pk.type === 'ammo') { const w=WEAPONS[currentWeapon]; ammo[currentWeapon]=(ammo[currentWeapon]??w.mag)+Math.floor(w.mag/2); }
      else if (pk.type === 'weapon' && pk.weapon && !Object.keys(ammo).includes(pk.weapon)) {
        ammo[pk.weapon] = WEAPONS[pk.weapon].mag;
        currentWeapon = pk.weapon;
        showBanner(WEAPONS[pk.weapon].name + '!');
        updateWeaponSlots();
      }
      scene.remove(pk.mesh);
      pickups.splice(i, 1);
      updateAmmo();
      updateHUD();
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
    p.velocity.y += GRAVITY * dt * 0.3;
    p.life -= dt;
    p.mesh.material.opacity = p.life / p.maxLife;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // Wave check
  if (waveActive && enemies.length === 0) {
    waveActive = false;
    setTimeout(() => {
      if (gameRunning) {
        hp = Math.min(maxHp, hp + 25);
        spawnPickup(player.position.clone().add(new THREE.Vector3(2, 0, 0)));
        spawnPickup(player.position.clone().add(new THREE.Vector3(-2, 0, 0)));
        updateHUD();
        startWave();
      }
    }, 3000);
  }

  // Minimap
  updateMinimap();

  renderer.render(scene, camera);
}

// ========== DAMAGE ==========
function dealDamage(dmg) {
  if (armor > 0) {
    const absorbed = Math.min(armor, dmg * 0.6);
    armor -= absorbed;
    dmg -= absorbed;
  }
  hp -= dmg;
  const flash = document.getElementById('damage-flash');
  flash.style.background = '#f8514944';
  setTimeout(() => flash.style.background = '#f8514900', 150);
  updateHUD();
  if (hp <= 0) gameOver();
}

// ========== MINIMAP ==========
function updateMinimap() {
  const mc = document.getElementById('minimap-canvas');
  const ctx = mc.getContext('2d');
  const size = 120;
  const scale = size / MAP_SIZE;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, size, size);

  // Obstacles
  ctx.fillStyle = '#30363d';
  obstacles.forEach(o => {
    ctx.fillRect((o.x + MAP_SIZE/2)*scale, (o.z + MAP_SIZE/2)*scale, o.w*scale, o.d*scale);
  });

  // Enemies
  ctx.fillStyle = '#da3633';
  enemies.forEach(e => {
    const ex = (e.mesh.position.x + MAP_SIZE/2)*scale;
    const ez = (e.mesh.position.z + MAP_SIZE/2)*scale;
    ctx.beginPath();
    ctx.arc(ex, ez, 2, 0, Math.PI*2);
    ctx.fill();
  });

  // Pickups
  ctx.fillStyle = '#22cc44';
  pickups.forEach(pk => {
    const px = (pk.mesh.position.x + MAP_SIZE/2)*scale;
    const pz = (pk.mesh.position.z + MAP_SIZE/2)*scale;
    ctx.fillRect(px-1, pz-1, 2, 2);
  });

  // Player
  const px = (player.position.x + MAP_SIZE/2)*scale;
  const pz = (player.position.z + MAP_SIZE/2)*scale;
  ctx.fillStyle = '#58a6ff';
  ctx.beginPath();
  ctx.arc(px, pz, 3, 0, Math.PI*2);
  ctx.fill();

  // Player direction
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(px, pz);
  ctx.lineTo(px - Math.sin(cameraAngle)*6, pz - Math.cos(cameraAngle)*6);
  ctx.stroke();
}

// ========== UI ==========
function updateHUD() {
  document.getElementById('hp-bar').style.width = (hp/maxHp*100)+'%';
  document.getElementById('armor-bar').style.width = (armor/maxArmor*100)+'%';
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('wave-display').textContent = `Волна ${wave} | 🎯 ${kills}`;
}

function updateAmmo() {
  const w = WEAPONS[currentWeapon];
  const cur = ammo[currentWeapon] ?? w.mag;
  document.getElementById('ammo-display').textContent = `${cur} / ${w.mag}${reloading ? ' ⏳' : ''}`;
}

function updateWeaponSlots() {
  const container = document.getElementById('weapon-slots');
  container.innerHTML = '';
  Object.keys(ammo).forEach((wk, i) => {
    const slot = document.createElement('div');
    slot.className = 'wslot' + (wk===currentWeapon?' active':'');
    slot.textContent = WEAPONS[wk].emoji;
    slot.onclick = () => { currentWeapon = wk; reloading = false; updateWeaponSlots(); updateAmmo(); };
    container.appendChild(slot);
  });
}

function addKillFeed(name) {
  const feed = document.getElementById('killfeed');
  const msg = document.createElement('div');
  msg.className = 'kmsg';
  msg.textContent = `✕ ${name}`;
  feed.appendChild(msg);
  setTimeout(() => msg.remove(), 3000);
}

function doReload() {
  if (reloading) return;
  const w = WEAPONS[currentWeapon];
  if ((ammo[currentWeapon] ?? 0) >= w.mag) return;
  reloading = true;
  reloadStart = performance.now();
  showBanner('Перезарядка...');
}

// ========== GAME FLOW ==========
window.startGame = function(mode) {
  // Reset
  enemies.forEach(e => scene.remove(e.mesh));
  bullets.forEach(b => scene.remove(b.mesh));
  particles.forEach(p => scene.remove(p.mesh));
  pickups.forEach(pk => scene.remove(pk.mesh));
  enemies = []; bullets = []; particles = []; pickups = [];
  score = 0; wave = 0; kills = 0;
  hp = mode === 'survival' ? 150 : 100;
  maxHp = mode === 'survival' ? 150 : 100;
  armor = 0;
  player.position.set(0, 0, 0);
  currentWeapon = 'rifle';
  ammo = {rifle: 30, pistol: 12};
  reloading = false;

  gameRunning = true;
  paused = false;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('gameover').style.display = 'none';

  updateHUD();
  updateWeaponSlots();
  updateAmmo();

  clock.start();
  startWave();
  gameLoop();
};

window.restartGame = function() {
  startGame('waves');
};

window.backToMenu = function() {
  gameRunning = false;
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
};

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  if (!paused) clock.getDelta(); // Reset delta
}

function gameOver() {
  gameRunning = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('gameover').style.display = 'flex';
  document.getElementById('final-score').textContent = `Очки: ${score}`;
  document.getElementById('final-wave').textContent = `Волна: ${wave} | Убийств: ${kills}`;
}

// ========== START ==========
init();
</script>
