name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate game audio + textures
        run: |
          cd assets
          python3 gen.py
          cd ..

      - name: Download Three.js
        run: curl -sL "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" -o assets/three.module.js

      - name: Download 3D models
        run: |
          mkdir -p assets/models/{characters,environment,maps,weapons}
          curl -sL "https://github.com/KenneyNL/Starter-Kit-FPS/archive/refs/heads/main.zip" -o /tmp/kenney.zip --max-time 60
          unzip -o /tmp/kenney.zip -d /tmp/kenney/ 2>/dev/null
          cp /tmp/kenney/Starter-Kit-FPS-main/models/*.glb assets/models/environment/ 2>/dev/null
          curl -sL "https://github.com/KhronosGroup/glTF-Sample-Models/raw/main/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb" -o assets/models/environment/helmet.glb --max-time 30
          curl -sL "https://github.com/KhronosGroup/glTF-Sample-Models/raw/main/2.0/Avocado/glTF-Binary/Avocado.glb" -o assets/models/environment/avocado.glb --max-time 30
          curl -sL "https://github.com/KhronosGroup/glTF-Sample-Models/raw/main/2.0/Sponza/glTF-Binary/Sponza.glb" -o assets/models/maps/sponza.glb --max-time 60

      - name: Bundle all assets
        run: |
          mkdir -p android/app/src/main/assets/{textures,audio,models/{characters,environment,maps,weapons}}
          cp index.html android/app/src/main/assets/index.html
          cp assets/three.module.js android/app/src/main/assets/three.module.js
          cp -r assets/textures/* android/app/src/main/assets/textures/ 2>/dev/null
          cp -r assets/audio/* android/app/src/main/assets/audio/ 2>/dev/null
          cp -r assets/models/* android/app/src/main/assets/models/ 2>/dev/null
          du -sh android/app/src/main/assets/

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" IronSquad-v1.0.0.apk
            echo "APK: $(ls -lh IronSquad-v1.0.0.apk | awk '{print $5}')"
          else
            echo "ERROR: No APK found!"; exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IronSquad-APK
          path: IronSquad-v1.0.0.apk
          retention-days: 30
